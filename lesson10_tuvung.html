<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG10</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3= [
                { voca: "あります", tv: "có (đồ vật, thực vật)" },
                { voca: "います", tv: "có (người, động vật)" },
                { voca: "いろいろ（な）", tv: "nhiều, đa dạng" },
                { voca: "おとこのひと", tv: "thanh niên, đàn ông" },
                { voca: "おんなのひと", tv: "cô gái, phụ nữ" },
                { voca: "おとこのこ", tv: "bé trai" },
                { voca: "おんなのこ", tv: "bé gái" },
                { voca: "いぬ", tv: "chó" },
                { voca: "こいぬ", tv: "chó con" },
                { voca: "ねこ", tv: "mèo" },
                { voca: "パンダ", tv: "gấu trúc" },
                { voca: "ぞう", tv: "voi" },
                { voca: "き", tv: "cây, cây cối" },
                { voca: "たいぼく", tv: "cây to, cây đại thụ" },
                { voca: "もの", tv: "đồ vật" },
                { voca: "でんち", tv: "cục pin" },
                { voca: "はこ", tv: "cái hộp" },
                { voca: "スイッチ", tv: "công tắc điện" },
                { voca: "れいぞうこ", tv: "tủ lạnh" },
                { voca: "テーブル", tv: "bàn" },
                { voca: "ベッド", tv: "giường" },
                { voca: "たな", tv: "kệ" },
                { voca: "ドア", tv: "cửa chính" },
                { voca: "まど", tv: "cửa sổ" },

                { voca: "ポスト", tv: "thùng thư" },
                { voca: "ビル", tv: "tòa nhà" },
                { voca: "エーティーエム", tv: "ATM" },
                { voca: "コンビニ", tv: "cửa hàng tiện lợi" },
                { voca: "こうえん", tv: "công viên" },
                { voca: "きっさてん", tv: "quán cà phê" },
                { voca: "〜や", tv: "quán ~, hiệu ~, tiệm ~" },
                { voca: "のりば", tv: "bến xe" },
                { voca: "〜けん", tv: "~ tỉnh" },
                { voca: "うえ", tv: "trên" },
                { voca: "した", tv: "dưới" },
                { voca: "まえ", tv: "trước" },
                { voca: "うしろ", tv: "sau" },
                { voca: "みぎ", tv: "bên phải" },
                { voca: "ひだり", tv: "bên trái" },
                { voca: "なか", tv: "(bên) trong" },
                { voca: "そと", tv: "(bên) ngoài" },
                { voca: "となり", tv: "bên cạnh, sát bên" },
                { voca: "ちかく", tv: "gần, ở gần" },
                { voca: "(～と〜の) あいだ", tv: "giữa (~ và ~)" },
                { voca: "(～や〜や〜) など", tv: "nào là ~ nào là ~ v.v..." },
                { voca: "どうもすみません", tv: "Xin cảm ơn / Bao hàm ý xin lỗi" },
                { voca: "チンプラー", tv: "nước mắm Thái" },
                { voca: "コーナー", tv: "góc, quầy, khu hàng" },
                { voca: "いちばんした", tv: "dưới cùng" },

                { voca: "とうきょうディズニーランド", tv: "công viên giải trí Disneyland ở Nhật" },
                { voca: "アジアストア", tv: "Cửa hàng Asia (tên giả định)" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
