<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Japanese Player</title>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
      font-family:Arial;
    }

    .box{
      width:450px;
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    #lyrics{
      font-size:30px;
      min-height:90px;
      margin:25px 0;
    }

    .buttons{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      padding:12px 22px;
      border:none;
      border-radius:12px;
      background:#4f46e5;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

  </style>
</head>
<body>

  <div class="box">

    <h1>Japanese N5</h1>

    <div id="lyrics">
      Nhấn Next
    </div>

    <div class="buttons">

      <button onclick="nextSentence()">
        Next
      </button>

      <button onclick="repeatSpeech()">
        Repeat
      </button>

      <button onclick="shufflePlaylist()">
        Random
      </button>

    </div>

  </div>

  <script>

    // ARRAY GỐC
    const sentences = [

      "おなまえはなんですか。",
      "おくにはどちらですか。",
      "あなたはがくせいですか。",
      "これはなんですか。",
      "トイレはどこですか。",   
      "2",
      "1",
      

    ];

    // ARRAY ĐANG CHẠY
    let playList = [...sentences];

    // INDEX
    let currentIndex = 0;

    // CÂU HIỆN TẠI
    let currentSentence = "";



    // HÀM ĐỌC
    function speak(text){

      const speech =
        new SpeechSynthesisUtterance(text);

      speech.lang = "ja-JP";

      speech.rate = 1;

      speechSynthesis.cancel();

      speechSynthesis.speak(speech);

    }



    // NEXT
    function nextSentence(){

      // hết thì quay lại đầu
      if(currentIndex >= playList.length){

        currentIndex = 0;

      }

      // lấy từ PLAYLIST
      currentSentence =
        playList[currentIndex];

      // hiện text
      document.getElementById("lyrics")
      .innerText = currentSentence;

      // đọc
      speak(currentSentence);

      // tăng index
      currentIndex++;

    }



    // REPEAT
    function repeatSpeech(){

      if(currentSentence !== ""){

        speak(currentSentence);

      }

    }



    // RANDOM ARRAY
    function shufflePlaylist(){

      // clone array gốc
      playList = [...sentences];

      // fisher-yates shuffle
      for(let i = playList.length - 1; i > 0; i--){

        const j =
          Math.floor(Math.random() * (i + 1));

        [playList[i], playList[j]] =
        [playList[j], playList[i]];

      }

      // reset index
      currentIndex = 0;

      console.log(playList);

      alert("Đã random!");

    }

  </script>

</body>
</html>
