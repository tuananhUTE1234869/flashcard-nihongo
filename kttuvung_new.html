<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Japanese Player</title>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
      font-family:Arial;
    }

    .box{
      width:450px;
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    #lyrics{
      font-size:30px;
      min-height:90px;
      margin:25px 0;
    }

    .buttons{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      padding:12px 22px;
      border:none;
      border-radius:12px;
      background:#4f46e5;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

  </style>
</head>
<body>

  <div class="box">

    <h1>Japanese N5</h1>

    <div id="lyrics">
      Nhấn Next
    </div>

    <div class="buttons">

      <button onclick="nextSentence()">
        Next
      </button>

      <button onclick="repeatSpeech()">
        Repeat
      </button>

      <button onclick="shufflePlaylist()">
        Random
      </button>

    </div>

  </div>

  <script>

    // ARRAY GỐC
    const sentences = [

    "あなたは にほんじん ですか。",
    "あなたは がくせい ですか。",
    "あなたは エンジニア ですか。",
    "あなたは せんせい ですか。",
    "あなたの なまえは なん ですか。",
    "おくには どこ ですか。",
    "これは ほん ですか。",
    "それは じしょ ですか。",
    "あれは なん ですか。",
    "これは だれ の かばん ですか。",
    "あなたの でんわばんごうは なんばん ですか。",
    "いま なんじ ですか。",
    "きょうは なんようび ですか。",
    "トイレは どこ ですか。",
    "あなたの へやは なんがい ですか。",
    "エレベーターは あそこ ですか。",
    "まいにち なにを しますか。",
    "あした どこへ いきますか。",
    "きのう べんきょう しましたか。",
    "あなたは なんじに おきますか。",
    "きょう がっこうへ いきますか。",
    "だれと にほんへ いきますか。",
    "いつ うちへ かえりますか。",
    "スーパーで なにを かいましたか。",
    "あなたは にほんごを べんきょう していますか。",
    "なにで がっこうへ いきますか。",
    "あなたの たんじょうびは いつ ですか。",
    "あなたは なにが すき ですか。",
    "サッカーが すき ですか。",
    "ねこが すき ですか。",
    "どんな えいがが すき ですか。",
    "あなたの へやは きれい ですか。",
    "にほんごは むずかしい ですか。",
    "きょうは いそがしい ですか。",
    "あなたの まちは にぎやか ですか。",
    "しずかな ところが すき ですか。",
    "まいあさ パンを たべますか。",
    "きのう テレビを みましたか。",
    "あなたは よく おんがくを ききますか。",
    "なにを のみますか。",
    "どこで ひるごはんを たべますか。",
    "だれと えいがを みますか。",
    "あなたは たばこを すいますか。",
    "どの たべものが すき ですか。",
    "あなたは くるまを もっていますか。",
    "あなたの うちは えきから とおい ですか。",
    "ここで しゃしんを とっても いい ですか。",
    "にほんごで はなしても いい ですか。",
    "この へやに はいっても いい ですか。",
    "いっしょに コーヒーを のみませんか。"
];

    // ARRAY ĐANG CHẠY
    let playList = [...sentences];

    // INDEX
    let currentIndex = 0;

    // CÂU HIỆN TẠI
    let currentSentence = "";



    // HÀM ĐỌC
    function speak(text){

      const speech =
        new SpeechSynthesisUtterance(text);

      speech.lang = "ja-JP";

      speech.rate = 1;

      speechSynthesis.cancel();

      speechSynthesis.speak(speech);

    }



    // NEXT
    function nextSentence(){

      // hết thì quay lại đầu
      if(currentIndex >= playList.length){

        currentIndex = 0;

      }

      // lấy từ PLAYLIST
      currentSentence =
        playList[currentIndex];

      // hiện text
      document.getElementById("lyrics")
      .innerText = currentSentence;

      // đọc
      speak(currentSentence);

      // tăng index
      currentIndex++;

    }



    // REPEAT
    function repeatSpeech(){

      if(currentSentence !== ""){

        speak(currentSentence);

      }

    }



    // RANDOM ARRAY
    function shufflePlaylist(){

      // clone array gốc
      playList = [...sentences];

      // fisher-yates shuffle
      for(let i = playList.length - 1; i > 0; i--){

        const j =
          Math.floor(Math.random() * (i + 1));

        [playList[i], playList[j]] =
        [playList[j], playList[i]];

      }

      // reset index
      currentIndex = 0;

      console.log(playList);

      alert("Đã random!");

    }

  </script>

</body>
</html>
