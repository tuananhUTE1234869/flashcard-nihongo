<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Japanese Player</title>

  <style>

    body{
      display: flex;
      flex-direction: column;
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
      font-family:Arial;
    }

    .box{
      width:450px;
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }
    .c-lyris {
    position: relative;

    }
    #lyrics{
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgb(95, 238, 66);
      font-size:30px;
      min-height:90px;
      margin:25px 0;
    }
    .dien {
      top: 0;
      left: 0;
      display: flex;
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: rgb(26, 91, 148);
      z-index: 2;
    }

    .buttons{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      padding:12px 22px;
      border:none;
      border-radius:12px;
      background:#4f46e5;
      color:white;
      font-size:18px;
      cursor:pointer;
    }
    .home {
      width: 100px;
      height: 50px;
      margin-top: 50px;
      background-color: greenyellow;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 5px;
      border: 1px solid black;
    }
        .bt-lyris {
      width: 100px;
      height: 50px;
      margin-top: 50px;
      background-color: rgb(26, 91, 148);
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 5px;
      border: 1px solid black;
    }

  </style>
</head>
<body>

  <div class="box">

    <h1>Japanese N5</h1>

    <div class="c-lyris">
      <div id="lyrics">
        Nhấn Next
      </div>
      <div class="dien"></div>
    </div>

    <div class="buttons">

      <button onclick="nextSentence()">
        Next
      </button>

      <button onclick="repeatSpeech()">
        Repeat
      </button>

      <button onclick="shufflePlaylist()">
        Random
      </button>

    </div>

  </div>

  <div class="bt-lyris">
    lyris
  </div>
  <div class="home">
    home
  </div>
  <script>

    // quay ve home 
    document.querySelector(".home").addEventListener("click",function(){
      window.location.href = "index.html"
    })
    let k = 0;
    function hidden(){
        if (k==0){
          document.querySelector(".dien").style.display = "none";
          document.querySelector(".bt-lyris").style.backgroundColor = "rgb(95, 238, 66)";
          return k=1;
        }else {
          document.querySelector(".dien").style.display = "flex";
          document.querySelector(".bt-lyris").style.backgroundColor = "rgb(26, 91, 148)";
          return k=0;
        }
    }
    // hiện lyris
    document.querySelector(".bt-lyris").addEventListener("click", function(){
      hidden();
    });



    // ARRAY GỐC
    const sentences = [
    // "おなまえは",
    // "おかあさんのたんじょうびはいつですか。",
    // "おとうさんのたんじょうびはいつですか。",
    // "ひとりでいきますか。",
    // "だれとにほんごをべんきょうしましたか。",
    // "まいにちなんじにおきますか",
    // "きのうのばんなんじにねましたか。",
    // "しゅうまつなにをしますか。",
    // "けさあさごはんをたべましたか。",
    // "こんばんにほんごをべんきょうしますか。",
    // "がっこうはなんじからなんじまでですか。",
    // "おかあさんはおいくつですか。",
    // "おとうさんはおいくつですか。",
    // "おかあさんはどんなひとですか。",
    // "きょうはなんようびですか。",
    // "きょうはいつですか。",
    // "まいにちなにでがっこうへいきますか。",
    // "きのうだれとがっこうへいきましたか。",
    // "おとうさんはどんなひとですか。",
    // "おとうさんの しごとは なんですか。",
    // "どこの だいがくですか。",
    // "せんもうは なんですか。",
    // "いなかはどんなところですか。",
    // "おかあさんのたんじょうびになにをあげましたか。",
    // "たんじょうびになにをもらいましたか。",

    "みかんを いくつ かいましたか。",
    "りんごを いくつ もらいましたか。",
    "きってを なんまい かいましたか。",
    "ふうとうを なんまい かいましたか。",
    "ほんを なんさつ よみましたか。",
    "えんぴつを なんぼん もっていますか。",

    "たまごを なんこ たべましたか。",
    "しゃしんを なんまい とりましたか。",
    "クラスに がくせいが なんにん いますか。",
    "かぞくは なんにん ですか。",
    "あなたはいもうとがいますか。",
    "あなたはきょうだいがいますか。",
    "このにもつ、アメリカまでふなびんでいくつですか。",
    "このにもつ、フランスまでこうくうびんでいくつですか。",
    "いちかげつなんかいえいがをみますか。",
    "いちしゅうかんになんにちぐらいかいしゃをやすみますか。",
    "まいにちどのくらいはたらきますか。",
    "まいにちなんじかんにほんごをべんきょうしますか。",
    "どのくらいにほんごをべんきょうしますか。",
    "いちねんになんかいえいがをみますか。",
    "レストランのなかにおとこのこがなんにんいますか。",
    "あにがなんにんとあねがなんにんいますか。"

    


];

    // ARRAY ĐANG CHẠY
    let playList = [...sentences];

    // INDEX
    let currentIndex = 0;

    // CÂU HIỆN TẠI
    let currentSentence = "";



    // HÀM ĐỌC
    function speak(text){

      const speech =
        new SpeechSynthesisUtterance(text);

      speech.lang = "ja-JP";

      speech.rate = 1;

      speechSynthesis.cancel();

      speechSynthesis.speak(speech);

    }



    // NEXT
    function nextSentence(){

      // hết thì quay lại đầu
      if(currentIndex >= playList.length){

        currentIndex = 0;

      }

      // lấy từ PLAYLIST
      currentSentence =
        playList[currentIndex];

      // hiện text
      document.getElementById("lyrics")
      .innerText = currentSentence;

      // đọc
      speak(currentSentence);

      // tăng index
      currentIndex++;

    }



    // REPEAT
    function repeatSpeech(){

      if(currentSentence !== ""){

        speak(currentSentence);

      }

    }



    // RANDOM ARRAY
    function shufflePlaylist(){

      // clone array gốc
      playList = [...sentences];

      // fisher-yates shuffle
      for(let i = playList.length - 1; i > 0; i--){

        const j =
          Math.floor(Math.random() * (i + 1));

        [playList[i], playList[j]] =
        [playList[j], playList[i]];

      }

      // reset index
      currentIndex = 0;

      console.log(playList);

      alert("Đã random!");

    }

  </script>

</body>
</html>
