<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI31</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

           let lesson3 = [
                { voca: "続", tv: "つづ(けます) tục" },
                { voca: "見", tv: "み(つけます) kiến" },
                { voca: "取", tv: "と(ります) thủ" },
                { voca: "休", tv: "やすみをと(ります) hưu" },
                { voca: "受", tv: "う(けます) thụ" },
                { voca: "試験", tv: "しけんをう(けます) thí-nghiệm" },
                { voca: "申込", tv: "もうしこ(みます) thân-cáo" },
                { voca: "休", tv: "やす(みます) hưu" },
                { voca: "連休", tv: "れんきゅう liên-hưu" },
                { voca: "作文", tv: "さくぶん tác-văn" },
                { voca: "発表", tv: "はっぴょう phát-biểu" },
                { voca: "発表", tv: "はっぴょう(します) phát-biểu" },
                { voca: "展覧会", tv: "てんらんかい triển-lãm-hội" },
                { voca: "結婚式", tv: "けっこんしき kết-hôn-thức" },
                { voca: "葬式", tv: "（お）そうしき tang-thức" },
                { voca: "式", tv: "しき thức" },
                { voca: "本社", tv: "ほんしゃ bản-xã" },
                { voca: "支店", tv: "してん chi-điếm" },
                { voca: "教会", tv: "きょうかい giáo-hội" },
                { voca: "大学院", tv: "だいがくいん đại-học-viện" },
                { voca: "動物園", tv: "どうぶつえん động-vật-viên" },
                { voca: "温泉", tv: "おんせん ôn-tuyền" },
                { voca: "帰", tv: "かえ(り) quy" },
                { voca: "子", tv: "おこさん tử" },
                { voca: "号", tv: "ごう hiệu" },
                { voca: "方", tv: "～のほう phương" },

                { voca: "新幹線", tv: "しんかんせん tân-cán-tuyến" },
                { voca: "新神戸", tv: "しんこうべ tân-thần-hộ" },
                { voca: "残", tv: "のこ(ります) tàn" },
                { voca: "入学試験", tv: "にゅうがくしけん nhập-học-thí-nghiệm" },
                { voca: "月", tv: "つき(月) nguyệt" },
                { voca: "村", tv: "むら thôn" },
                { voca: "卒業", tv: "そつぎょう(します) tốt-nghiệp" },
                { voca: "映画館", tv: "えいがかん ánh-họa-quán" },
                { voca: "嫌", tv: "いや(な) hiềm" },
                { voca: "空", tv: "そら không" },
                { voca: "閉", tv: "と(じます) bế" },
                { voca: "都会", tv: "とかい đô-hội" },
                { voca: "子供達", tv: "こどもたち tử-cung-đạt" },
                { voca: "自由", tv: "じゆうに tự-do" }
            ];




                        
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
