<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG17</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "おぼえます", tv: "nhớ, thuộc" },
                { voca: "わすれます", tv: "quên" },
                { voca: "うちにノートをわすれました", tv: "đã quên vở ở nhà" },

                { voca: "なくします", tv: "làm mất, đánh mất" },
                { voca: "ほんをなくしました", tv: "đã làm mất sách" },

                { voca: "はらいます", tv: "thanh toán, trả tiền" },
                { voca: "レジでおかねをはらってください", tv: "hãy thanh toán ở quầy tính tiền" },

                { voca: "かえします", tv: "trả lại (đồ mượn)" },
                { voca: "としょかんにほんをかえします", tv: "trả lại sách cho thư viện" },

                { voca: "でかけます", tv: "đi ra ngoài" },

                { voca: "ぬぎます", tv: "cởi (quần áo, giày dép)" },
                { voca: "ズボンをはきます", tv: "mặc quần" },
                { voca: "シャツをきます", tv: "mặc áo" },

                { voca: "もっていきます", tv: "mang đi, mang theo" },
                { voca: "もってきます", tv: "mang đến" },

                { voca: "しんぱいします", tv: "lo lắng" },
                { voca: "あんしんします", tv: "yên tâm" },

                { voca: "ざんぎょうします", tv: "tăng ca, làm thêm giờ" },
                { voca: "しゅっちょうします", tv: "đi công tác" },

                { voca: "のみます", tv: "uống" },
                { voca: "くすりをのみます", tv: "uống thuốc" },

                { voca: "はいります", tv: "vào, đi vào" },
                { voca: "おふろにはいります", tv: "tắm bồn, ngâm mình" },

                { voca: "たいせつ(な)", tv: "quan trọng" },
                { voca: "だいじょうぶ(な)", tv: "không sao, ổn" },

                { voca: "あぶない", tv: "nguy hiểm" },
                { voca: "きけん(な)", tv: "nguy hiểm" },

                { voca: "きんえん", tv: "cấm hút thuốc" },
                { voca: "きつえんしつ", tv: "phòng được hút thuốc" },

                { voca: "ほけんしょう", tv: "thẻ bảo hiểm (y tế)" },

                { voca: "ねつ", tv: "sốt" },
                { voca: "びょうき", tv: "bệnh (nói chung)" },
                { voca: "くすり", tv: "thuốc (trị bệnh)" },

                { voca: "おふろ", tv: "bồn tắm" },

                { voca: "うわぎ", tv: "áo khoác, đồ mặc ngoài" },
                { voca: "したぎ", tv: "quần áo lót" },

                { voca: "2、3にち", tv: "2 hay 3 ngày" },
                { voca: "2、3〜", tv: "2, 3 ~" },

                { voca: "〜までに", tv: "trước (thời hạn) ~" },
                { voca: "5じまでに", tv: "trước 5 giờ" },

                { voca: "ですから", tv: "vì vậy, cho nên" },
                { voca: "どうしましたか", tv: "bạn bị làm sao vậy?" },

                { voca: "のど", tv: "cổ họng" },
                { voca: "のどがかわく", tv: "khát nước" },

                { voca: "〜がいたいです", tv: "bị đau ~" },

                { voca: "かぜ", tv: "cảm (cúm)" },
                { voca: "かぜをひく", tv: "bị cảm, nhiễm cảm" },
                { voca: "かぜがなおる", tv: "hết cảm" },

                { voca: "それから", tv: "ngoài ra" },
                { voca: "おだいじに", tv: "chúc bạn mau khỏe" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
