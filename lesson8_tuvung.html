<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG8</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "ハンサム (な)", tv: "đẹp trai" },
                { voca: "きれい (な)", tv: "đẹp gái, sạch sẽ" },
                { voca: "しずか (な)", tv: "yên tĩnh" },
                { voca: "にぎやか (な)", tv: "náo nhiệt, nhộn nhịp" },
                { voca: "ゆうめい (な)", tv: "nổi tiếng" },
                { voca: "しんせつ (な)", tv: "tốt bụng, tử tế" },
                { voca: "げんき (な)", tv: "khỏe mạnh" },
                { voca: "ひま (な)", tv: "rảnh" },
                { voca: "べんり (な)", tv: "tiện lợi" },
                { voca: "すてき (な)", tv: "đẹp, dễ thương" },

                { voca: "おおきい", tv: "lớn, to" },
                { voca: "ちいさい", tv: "nhỏ, bé" },
                { voca: "あたらしい", tv: "mới" },
                { voca: "ふるい", tv: "cũ, cổ" },
                { voca: "いい", tv: "tốt, hay, đẹp" },
                { voca: "わるい", tv: "xấu, có hại" },
                { voca: "あつい", tv: "nóng (thời tiết)" },
                { voca: "あつい", tv: "nóng (thức ăn, đồ uống)" },
                { voca: "さむい", tv: "lạnh (thời tiết)" },
                { voca: "つめたい", tv: "lạnh (thức ăn, đồ uống)" },

                { voca: "むずかしい", tv: "khó, phức tạp" },
                { voca: "やさしい", tv: "dễ, đơn giản" },
                { voca: "やさしい", tv: "hiền lành" },
                { voca: "たかい", tv: "cao, đắt" },
                { voca: "せがたかい", tv: "cao (người)" },
                { voca: "やすい", tv: "rẻ" },
                { voca: "ひくい", tv: "thấp (vật)" },
                { voca: "せがひくい", tv: "thấp (người)" },
                { voca: "おもしろい", tv: "thú vị, hay, hấp dẫn" },
                { voca: "おいしい", tv: "ngon" },

                { voca: "まずい", tv: "dở, không ngon" },
                { voca: "いそがしい", tv: "bận, bận rộn" },
                { voca: "たのしい", tv: "vui vẻ" },
                { voca: "しろい", tv: "trắng" },
                { voca: "くろい", tv: "đen" },
                { voca: "あかい", tv: "đỏ" },
                { voca: "あおい", tv: "xanh da trời" },

                { voca: "さくら", tv: "hoa anh đào" },
                { voca: "やま", tv: "núi" },
                { voca: "まち", tv: "thị trấn, thành phố" },
                { voca: "たべもの", tv: "đồ ăn, thức ăn" },
                { voca: "ところ", tv: "nơi, chỗ" },
                { voca: "りょう", tv: "ký túc xá" },
                { voca: "レストラン", tv: "nhà hàng" },
                { voca: "せいかつ", tv: "cuộc sống" },
                { voca: "しごと", tv: "công việc" },
                { voca: "おしごと", tv: "công việc của bạn" },

                { voca: "しごとをします", tv: "làm việc" },
                { voca: "どう", tv: "như thế nào" },
                { voca: "どんな", tv: "~ như thế nào" },
                { voca: "とても", tv: "rất, quá, lắm" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })

            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });
        </script>
    </body>
</html>
