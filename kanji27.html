<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI27</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

        let lesson3 = [
            { voca: "飼", tv: "か(います) tự" },
            { voca: "走", tv: "はし(ります) tẩu" },
            { voca: "道--走", tv: "みち-(を)-はし(ります) đạo-tẩu" },

            { voca: "見", tv: "み(えます) kiến" },
            { voca: "山--見", tv: "やま-(が)-み(えます) sơn-kiến" },

            { voca: "聞", tv: "き(こえます) văn" },
            { voca: "音--聞", tv: "おと-(が)-き(こえます) âm-văn" },

            { voca: "道--出来", tv: "みち-(が)-でき(ます) đạo-xuất-lai" },

            { voca: "開", tv: "ひら(きます) khai" },
            { voca: "教室--開", tv: "きょうしつ-(を)-ひら(きます) giáo-thất-khai" },

            { voca: "心配", tv: "しんぱい(な) tâm-phối" },

            { voca: "鳥", tv: "とり điểu" },

            { voca: "声", tv: "こえ thanh" },

            { voca: "波", tv: "なみ ba" },

            { voca: "花火", tv: "はなび hoa-hỏa" },

            { voca: "道具", tv: "どうぐ đạo-cụ" },

            { voca: "家", tv: "いえ gia" },

            { voca: "教室", tv: "きょうしつ giáo-thất" },

            { voca: "方", tv: "かた phương" },

            { voca: "後", tv: "ご hậu" },

            { voca: "他", tv: "ほか tha" },
            { voca: "他--", tv: "ほか-(の) tha" },

            { voca: "家具", tv: "かぐ gia-cụ" },

            { voca: "本棚", tv: "ほんだな bản-bằng" },

            { voca: "建", tv: "た(てます) kiến" },

            { voca: "素晴", tv: "すば(らしい) tố-tình" },

            { voca: "子供達", tv: "こどもたち tử-cung-đạt" },

            { voca: "大好", tv: "だいす(き) đại-hảo" },

            { voca: "主人公", tv: "しゅじんこう chủ-nhân-công" },

            { voca: "形", tv: "かたち hình" },

            { voca: "不思議", tv: "ふしぎ bất-tư-nghị" },

            { voca: "例", tv: "たと(えば) lệ" },

            { voca: "付", tv: "つ(けます) phó" },

            { voca: "自由", tv: "じゆう tự-do" },

            { voca: "空", tv: "そら không" },

            { voca: "飛", tv: "と(びます) phi" },

            { voca: "昔", tv: "むかし tích" },

            { voca: "自分", tv: "じぶん tự-phân" },

            { voca: "将来", tv: "しょうらい tương-lai" }
        ];
                        
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
