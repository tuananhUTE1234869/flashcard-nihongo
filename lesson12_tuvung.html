<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG12</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "かんたん(な)", tv: "đơn giản" },
                { voca: "ちかい", tv: "gần" },
                { voca: "とおい", tv: "xa" },
                { voca: "はやい", tv: "sớm, nhanh" },
                { voca: "おそい", tv: "chậm, trễ" },
                { voca: "おおい", tv: "nhiều" },
                { voca: "ひとがおおい", tv: "nhiều người, đông người" },
                { voca: "すくない", tv: "ít" },
                { voca: "ひとがすくない", tv: "ít người" },
                { voca: "あたたかい", tv: "ấm áp (thời tiết, đồ ăn thức uông)" },
                { voca: "すずしい", tv: "mát mẻ (thời tiết)" },
                { voca: "あまい", tv: "ngọt" },
                { voca: "からい", tv: "cay" },
                { voca: "おもい", tv: "nặng" },
                { voca: "かるい", tv: "nhẹ" },
                { voca: "いい", tv: "tốt, ngon, thích, muốn" },
                { voca: "コーヒーがいい", tv: "(tôi muốn) cà phê" },
                { voca: "きせつ", tv: "mùa, mùa màng" },
                { voca: "はる", tv: "mùa xuân" },
                { voca: "なつ", tv: "mùa hè" },
                { voca: "あき", tv: "mùa thu" },
                { voca: "ふゆ", tv: "mùa đông" },

                { voca: "てんき", tv: "thời tiết" },
                { voca: "あめ", tv: "mưa" },
                { voca: "ゆき", tv: "tuyết" },
                { voca: "くもり", tv: "có mây, trời âm u" },
                { voca: "ホテル", tv: "khách sạn" },
                { voca: "くうこう", tv: "sân bay" },
                { voca: "うみ", tv: "biển" },
                { voca: "せかい", tv: "thế giới" },
                { voca: "パーティー", tv: "tiệc, bữa tiệc" },
                { voca: "(お)まつり", tv: "lễ hội" },
                { voca: "すきやき", tv: "món Sukiyaki" },
                { voca: "さしみ", tv: "món Sashimi" },
                { voca: "(お)すし", tv: "món Sushi" },
                { voca: "てんぷら", tv: "món Tempura" },
                { voca: "ぶたにく", tv: "thịt heo" },
                { voca: "とりにく", tv: "thịt gà" },
                { voca: "ぎゅうにく", tv: "thịt bò" },
                { voca: "レモン", tv: "chanh" },
                { voca: "いけばな", tv: "nghệ thuật cắm hoa" },
                { voca: "もみじ", tv: "(hiện tượng) lá đổi màu (thành vàng/đỏ)" },
                { voca: "どちら", tv: "đằng nào, cái nào" },
                { voca: "どちらも", tv: "đằng nào cũng, cả hai đều" },
                { voca: "いちばん", tv: "nhất" },
                { voca: "ずっと", tv: "suốt, hơn hẳn" },
                { voca: "はじめて", tv: "lần đầu tiên" },
                { voca: "ただいま", tv: "tôi về rồi đây" },

                { voca: "おかえりなさい", tv: "anh/chị về rồi ạ" },
                { voca: "わあ、すごいひとですね", tv: "ồ, đông người quá nhỉ!" },
                { voca: "つかれました", tv: "tôi mệt" },
                { voca: "ぎおんまつり", tv: "lễ hội Gion (ở Kyoto)" },
                { voca: "ホンコン", tv: "Hồng Kông" },
                { voca: "シンガポール", tv: "Singapore" },
                { voca: "ABCストア", tv: "siêu thị ABC (tên giả định)" },
                { voca: "ジャパン", tv: "siêu thị Japan (tên giả định)" },
            ];


            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
