<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI17</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "覚", tv: "おぼ(える) giác" },
                { voca: "忘", tv: "わす(れる) vong" },
                { voca: "家", tv: "うち gia" },
                { voca: "忘", tv: "わす(れました) vong" },

                { voca: "無", tv: "な(くします) vô" },
                { voca: "本", tv: "ほん bản" },

                { voca: "払", tv: "はら(います) phát" },
                { voca: "金", tv: "かね kim" },

                { voca: "返", tv: "かえ(します) phản" },
                { voca: "図書館", tv: "としょかん đồ-thư-quán" },

                { voca: "出", tv: "で(かけます) xuất" },

                { voca: "脱", tv: "ぬ(ぎます) thoát" },
                { voca: "履", tv: "は(きます) lý" },
                { voca: "着", tv: "き(ます) trước" },

                { voca: "持", tv: "も(っていきます) trì" },
                { voca: "持", tv: "も(ってきます) trì" },

                { voca: "心配", tv: "しんぱい tâm-phối" },
                { voca: "安心", tv: "あんしん an-tâm" },

                { voca: "残業", tv: "ざんぎょう tàn-nghiệp" },
                { voca: "出張", tv: "しゅっちょう xuất-trương" },

                { voca: "飲", tv: "の(みます) ẩm" },
                { voca: "薬", tv: "くすり dược" },

                { voca: "入", tv: "はい(ります) nhập" },
                { voca: "風呂", tv: "ふろ phong-lữ" },

                { voca: "大切", tv: "たいせつ đại-thiết" },
                { voca: "大丈夫", tv: "だいじょうぶ đại-trượng-phu" },

                { voca: "危", tv: "あぶ(ない) nguy" },
                { voca: "危険", tv: "きけん nguy-hiểm" },

                { voca: "禁煙", tv: "きんえん cấm-yên" },
                { voca: "喫煙室", tv: "きつえんしつ khiết-yên-thất" },

                { voca: "保険証", tv: "ほけんしょう bảo-hiểm-chứng" },

                { voca: "熱", tv: "ねつ nhiệt" },
                { voca: "病気", tv: "びょうき bệnh-khí" },
                { voca: "薬", tv: "くすり dược" },

                { voca: "風呂", tv: "ふろ phong-lữ" },

                { voca: "上着", tv: "うわぎ thượng-trước" },
                { voca: "下着", tv: "したぎ hạ-trước" },

                { voca: "日", tv: "にち nhật" },

                { voca: "時", tv: "じ thời" },

                { voca: "喉", tv: "のど hầu" },
                { voca: "渇", tv: "かわ(く) khát" },

                { voca: "痛", tv: "いた(い) thống" },

                { voca: "風邪", tv: "かぜ phong-tà" },
                { voca: "引", tv: "ひ(く) dẫn" },
                { voca: "治", tv: "なお(る) trị" },

                { voca: "大事", tv: "だいじ đại-sự" }
            ];
            
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
