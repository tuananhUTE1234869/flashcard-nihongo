<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI26</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "見", tv: "み(ます) xem, nhìn" },
                { voca: "探", tv: "さが(します) tìm kiếm" },

                { voca: "遅", tv: "おく(れます) trễ, muộn" },
                { voca: "時間--遅", tv: "じかん-に-おく(れます) trễ giờ" },

                { voca: "間---合", tv: "ま-に-あ(います) kịp" },
                { voca: "時間--間---合", tv: "じかん-に-ま-に-あ(います) kịp giờ" },

                { voca: "拾", tv: "ひろ(います) nhặt" },
                { voca: "拾", tv: "ごみ-を-ひろ(います) nhặt rác" },

                { voca: "連絡", tv: "れんらく(します) liên lạc" },

                { voca: "気分---良", tv: "きぶん-が-い(い) cảm thấy khỏe, tâm trạng tốt" },
                { voca: "気分---悪", tv: "きぶん-が-わる(い) cảm thấy khó chịu, tâm trạng xấu" },

                { voca: "運動会", tv: "うんどうかい hội thao" },
                { voca: "運動会--参加", tv: "うんどうかい-に-さんか(します) tham gia hội thao" },

                { voca: "盆踊", tv: "ぼんおどり điệu múa Bon" },

                { voca: "場所", tv: "ばしょ địa điểm, nơi chốn" },

                { voca: "財布", tv: "さいふ ví" },

                { voca: "国際会議場", tv: "こくさいかいぎじょう trung tâm hội nghị quốc tế" },

                { voca: "平日", tv: "へいじつ ngày thường" },

                { voca: "～弁", tv: "～べん tiếng, giọng địa phương" },

                { voca: "今度", tv: "こんど lần này, lần tới" },

                { voca: "随分", tv: "ずいぶん rất, khá, nhiều" },

                { voca: "直接", tv: "ちょくせつ trực tiếp" },

                { voca: "誰----", tv: "だれでも bất cứ ai" },
                { voca: "何----", tv: "なんでも bất cứ cái gì" },

                { voca: "片付", tv: "かたづ(きます) được dọn dẹp, được sắp xếp gọn gàng" },
                { voca: "荷物--片付", tv: "にもつ-が-かたづ(きます) hành lý được sắp xếp gọn gàng" },

                { voca: "出", tv: "だ(します) đổ, đưa ra" },
                { voca: "出", tv: "ごみ-を-だ(します) đổ rác" },

                { voca: "燃---", tv: "もえるごみ rác cháy được" },

                { voca: "置場", tv: "おきば chỗ để, chỗ đặt" },

                { voca: "横", tv: "よこ bên cạnh" },

                { voca: "瓶", tv: "びん chai, lọ" },
                { voca: "缶", tv: "かん lon" },

                { voca: "～会社", tv: "～がいしゃ công ty ~" },

                { voca: "宇宙", tv: "うちゅう vũ trụ" },

                { voca: "～様", tv: "～さま ông/bà/ngài ~ (kính ngữ)" },

                { voca: "宇宙船", tv: "うちゅうせん tàu vũ trụ" },

                { voca: "怖", tv: "こわ(い) đáng sợ, sợ hãi" },

                { voca: "違", tv: "ちが(います) khác nhau" },

                { voca: "宇宙飛行士", tv: "うちゅうひこうし phi hành gia" },

            ];
                        
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
