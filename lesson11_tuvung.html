<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG11</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "います", tv: "có (hiện diện, có mặt)" },
                { voca: "こどもがいます", tv: "có con, có trẻ con" },
                { voca: "います", tv: "ở, sinh sống" },
                { voca: "にほんにいます", tv: "ở Nhật, sống ở Nhật" },
                { voca: "かかります", tv: "tốn (thời gian, tiền)" },
                { voca: "やすみます", tv: "nghỉ (vắng mặt)" },
                { voca: "かいしゃをやすみます", tv: "nghỉ làm (nghỉ phép)" },

                { voca: "ひとつ", tv: "1 cái" },
                { voca: "ふたつ", tv: "2 cái" },
                { voca: "みっつ", tv: "3 cái" },
                { voca: "よっつ", tv: "4 cái" },
                { voca: "いつつ", tv: "5 cái" },
                { voca: "むっつ", tv: "6 cái" },
                { voca: "ななつ", tv: "7 cái" },
                { voca: "やっつ", tv: "8 cái" },
                { voca: "ここのつ", tv: "9 cái" },
                { voca: "とお", tv: "10 cái" },
                { voca: "じゅういち", tv: "11 cái" },
                { voca: "じゅうに", tv: "12 cái" },
                { voca: "にじゅう", tv: "20 cái" },
                { voca: "ひゃく", tv: "100 cái" },
                { voca: "いくつ", tv: "bao nhiêu cái?" },

                { voca: "ひとり", tv: "1 người" },
                { voca: "ふたり", tv: "2 người" },
                { voca: "よにん", tv: "4 người" },
                { voca: "〜にん", tv: "~ người" },
                { voca: "〜だい", tv: "~ cái (máy móc)" },
                { voca: "〜まい", tv: "~ cái, tờ (vật mỏng)" },
                { voca: "〜かい", tv: "~ lần" },

                { voca: "りんご", tv: "táo" },
                { voca: "みかん", tv: "cam" },
                { voca: "サンドイッチ", tv: "bánh mì sandwich" },
                { voca: "カレー（ライス）", tv: "cơm cà ri Nhật" },
                { voca: "アイスクリーム", tv: "kem" },

                { voca: "きって", tv: "con tem" },
                { voca: "はがき", tv: "bưu thiếp" },
                { voca: "ふうとう", tv: "phong bì, bao thư" },

                { voca: "りょうしん", tv: "cha mẹ tôi" },
                { voca: "きょうだい", tv: "anh chị em" },
                { voca: "あに", tv: "anh trai tôi" },
                { voca: "おにいさん", tv: "anh trai (của người khác)" },
                { voca: "あね", tv: "chị gái tôi" },
                { voca: "おねえさん", tv: "chị gái (của người khác)" },
                { voca: "おとうと", tv: "em trai tôi" },
                { voca: "おとうとさん", tv: "em trai (của người khác)" },
                { voca: "いもうと", tv: "em gái tôi" },
                { voca: "いもうとさん", tv: "em gái (của người khác)" },

                { voca: "がいこく", tv: "nước ngoài" },
                { voca: "りゅうがくせい", tv: "du học sinh" },
                { voca: "クラス", tv: "lớp (học)" },

                { voca: "〜じかん", tv: "~ tiếng (đơn vị thời gian)" },
                { voca: "〜しゅうかん", tv: "~ tuần" },
                { voca: "〜かげつ", tv: "~ tháng" },
                { voca: "〜ねん", tv: "~ năm" },
                { voca: "〜ぐらい", tv: "khoảng ~" },
                { voca: "どのくらい", tv: "bao lâu" },

                { voca: "ぜんぶで", tv: "tổng cộng" },
                { voca: "みんな", tv: "tất cả, mọi người" },
                { voca: "〜だけ", tv: "chỉ ~" },

                { voca: "かしこまりました", tv: "Tôi đã hiểu rồi" },
                { voca: "いい（お）てんきですね", tv: "Thời tiết đẹp nhỉ!" },
                { voca: "おでかけですか", tv: "Bạn đi ra ngoài à?" },
                { voca: "ちょっと〜まで", tv: "Tôi đến ~ một chút" },

                { voca: "いってらっしゃい", tv: "Bạn đi nhé!" },
                { voca: "いってきます", tv: "Tôi đi đây" },

                { voca: "ふなびん", tv: "đường tàu thủy" },
                { voca: "こうくうびん", tv: "đường hàng không" },
                { voca: "エアメール", tv: "đường hàng không (gửi thư, tài liệu)" },

                { voca: "おねがいします", tv: "làm ơn / xin nhờ" },
                { voca: "オーストラリア", tv: "nước Úc" }
            ];
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
