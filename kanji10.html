<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI10</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "色々", tv: "いろいろ sắc--sắc" },

                { voca: "男--人", tv: "おとこ (の) ひと nam--nhân" },
                { voca: "女--人", tv: "おんな (の) ひと nữ--nhân" },
                { voca: "男--子", tv: "おとこ (の) こ nam--tử" },
                { voca: "女--子", tv: "おんな (の) こ nữ--tử" },

                { voca: "犬", tv: "いぬ khuyển" },
                { voca: "子犬", tv: "こ--いぬ tử--khuyển" },
                { voca: "猫", tv: "ねこ miêu" },
                { voca: "象", tv: "ぞう tượng" },

                { voca: "木", tv: "き mộc" },
                { voca: "大木", tv: "たい--ぼく đại--mộc" },

                { voca: "物", tv: "もの vật" },

                { voca: "電池", tv: "でん--ち điện--trì" },
                { voca: "箱", tv: "はこ tương/sương" },

                { voca: "冷蔵庫", tv: "れい--ぞう--こ lãnh--tàng--khố" },

                { voca: "棚", tv: "たな bằng" },
                { voca: "窓", tv: "まど song" },

                { voca: "公園", tv: "こう--えん công--viên" },
                { voca: "喫茶店", tv: "きっ--さ--てん khiết--trà--điếm" },
                { voca: "屋", tv: "~や ốc" },
                { voca: "乗--場", tv: "の (り) ば thừa--trường" },
                { voca: "県", tv: "けん huyện" },

                { voca: "上", tv: "うえ thượng" },
                { voca: "下", tv: "した hạ" },
                { voca: "前", tv: "まえ tiền" },

                { voca: "後", tv: "うし (ろ) hậu" },

                { voca: "右", tv: "みぎ hữu" },
                { voca: "左", tv: "ひだり tả" },

                { voca: "中", tv: "なか trung" },
                { voca: "外", tv: "そと ngoại" },

                { voca: "隣", tv: "となり lân" },
                { voca: "近", tv: "ちか (く) cận" },

                { voca: "間", tv: "あいだ gian" },

                { voca: "一番下", tv: "いち--ばん--した nhất--phiên--hạ" },

                { voca: "東京", tv: "とう--きょう đông--kinh" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
