<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG16</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "のります", tv: "lên (tàu, xe), cưỡi" },
                { voca: "でんしゃにのります", tv: "lên tàu điện" },

                { voca: "おります", tv: "xuống khỏi (xe, tàu)" },
                { voca: "でんしゃをおります", tv: "xuống khỏi tàu điện" },

                { voca: "のりかえます", tv: "đổi, chuyển (xe, tàu)" },

                { voca: "あびます", tv: "tắm" },
                { voca: "シャワーをあびます", tv: "tắm vòi sen" },

                { voca: "いれます", tv: "cho vào, bỏ vào" },

                { voca: "だします", tv: "lấy ra, gửi, nộp" },

                { voca: "おろします", tv: "rút (tiền)" },
                { voca: "おかねをおろします", tv: "rút tiền" },

                { voca: "はいります", tv: "vào, bước vào" },
                { voca: "だいがくにはいります", tv: "vào đại học" },

                { voca: "でます", tv: "ra, rời khỏi, tốt nghiệp" },
                { voca: "だいがくをでます", tv: "tốt nghiệp đại học" },

                { voca: "おします", tv: "ấn, nhấn, đẩy" },

                { voca: "のみます", tv: "uống" },

                { voca: "はじめます", tv: "bắt đầu" },

                { voca: "けんがくします", tv: "tham quan học hỏi" },

                { voca: "でんわします", tv: "gọi điện thoại" },

                { voca: "わかい", tv: "trẻ" },

                { voca: "ながい", tv: "dài" },

                { voca: "みじかい", tv: "ngắn" },

                { voca: "あかるい", tv: "sáng sủa, tươi sáng" },

                { voca: "くらい", tv: "tối, thiếu ánh sáng" },

                { voca: "からだ", tv: "cơ thể" },

                { voca: "あたま", tv: "đầu" },

                { voca: "かみ", tv: "tóc" },

                { voca: "かお", tv: "mặt" },

                { voca: "め", tv: "mắt" },

                { voca: "みみ", tv: "tai" },

                { voca: "はな", tv: "mũi" },

                { voca: "くち", tv: "miệng" },

                { voca: "は", tv: "răng" },

                { voca: "おなか", tv: "bụng" },

                { voca: "あし", tv: "chân" },

                { voca: "せなか", tv: "lưng" },

                { voca: "せがたかい", tv: "cao (người)" },

                { voca: "せがひくい", tv: "thấp (người)" },

                { voca: "サービス", tv: "dịch vụ, phục vụ" },

                { voca: "ジョギング", tv: "môn chạy bộ" },

                { voca: "ジョギングをします", tv: "chạy bộ" },

                { voca: "シャワー", tv: "vòi sen" },

                { voca: "みどり", tv: "màu xanh lá cây" },

                { voca: "おてら", tv: "chùa" },

                { voca: "じんじゃ", tv: "đền Thần đạo" },

                { voca: "〜ばん", tv: "số ~" },

                { voca: "どうやって", tv: "bằng cách nào" },

                { voca: "どの〜", tv: "~ nào" },

                { voca: "どれ", tv: "cái nào (từ 3 cái trở lên)" },

                { voca: "すごいですね", tv: "thật là giỏi!" },

                { voca: "まだまだです", tv: "tôi vẫn còn kém lắm" },

                { voca: "おひきだしですか", tv: "bạn rút tiền phải không?" },

                { voca: "まず", tv: "trước tiên, trước hết" },

                { voca: "つぎに", tv: "tiếp theo" },

                { voca: "キャッシュカード", tv: "thẻ ATM" },

                { voca: "あんしょうばんごう", tv: "mật khẩu" },

                { voca: "きんがく", tv: "số tiền" },

                { voca: "かくにん", tv: "xác nhận" },

                { voca: "ボタン", tv: "nút bấm" },

                { voca: "ジェーアール", tv: "JR (đường sắt Nhật Bản)" },

                { voca: "ゆきまつり", tv: "lễ hội tuyết" },

                { voca: "バンドン", tv: "Bandung" },

                { voca: "フランケン", tv: "Franken" },

                { voca: "ベラクルス", tv: "Veracruz" },

                { voca: "うめだ", tv: "Umeda (Osaka)" },

                { voca: "だいがくまえ", tv: "trạm Đại Học Trước" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
