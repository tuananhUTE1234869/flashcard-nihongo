<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI13</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

          let lesson3 = [
            { voca: "遊", tv: "あそ(ぶ) du" },
            { voca: "泳", tv: "およ(ぐ) vịnh" },
            { voca: "水泳", tv: "すいえい thủy--vịnh" },
            { voca: "迎", tv: "むか(える) nghênh" },
            { voca: "疲", tv: "つか(れる) bì" },
            { voca: "結婚", tv: "けっこん kết--hôn" },
            { voca: "買物", tv: "かいもの mãi--vật" },
            { voca: "食事", tv: "しょくじ thực--sự" },
            { voca: "散歩", tv: "さんぽ tán--bộ" },
            { voca: "公園", tv: "こうえん công--viên" },
            { voca: "大変", tv: "たいへん đại--biến" },
            { voca: "欲", tv: "ほ(しい) dục" },
            { voca: "広", tv: "ひろ(い) quảng" },
            { voca: "狭", tv: "せま(い) hiệp" },
            { voca: "川", tv: "かわ xuyên" },
            { voca: "美術館", tv: "びじゅつかん mỹ--thuật--quán" },
            { voca: "週末", tv: "しゅうまつ chu--mạt" },
            { voca: "平日", tv: "へいじつ bình--nhật" },
            { voca: "正月", tv: "しょうがつ chính--nguyệt" },
            { voca: "頃", tv: "ごろ khoảnh" },
            { voca: "何", tv: "なに hà" },
            { voca: "喉", tv: "のど hầu" },
            { voca: "渇", tv: "かわ(く) khát" },
            { voca: "腹", tv: "はら phúc" },
            { voca: "空", tv: "す(く) không" },
            { voca: "注文", tv: "ちゅうもん chú--văn" },
            { voca: "定食", tv: "ていしょく định--thực" },
            { voca: "牛丼", tv: "ぎゅうどん ngưu--tỉnh" },
            { voca: "少々", tv: "しょうしょう thiểu--thiểu" },
            { voca: "別々", tv: "べつべつ biệt--biệt" }
        ];
            
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
