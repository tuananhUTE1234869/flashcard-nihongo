<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI23</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "聞", tv: "き(きます) văn" },

                { voca: "回", tv: "まわ(します) hồi" },

                { voca: "左--回", tv: "ひだり-(へ)-まわ(します) tả-hồi" },

                { voca: "引", tv: "ひ(きます) dẫn" },

                { voca: "押", tv: "お(します) áp" },

                { voca: "変", tv: "か(えます) biến" },

                { voca: "紙---変", tv: "かみ-(の)-サイズ-(を)-か(えます) chỉ-biến" },

                { voca: "触", tv: "さわ(ります) xúc" },


                { voca: "水--出", tv: "みず-(が)-で(ます) thủy-xuất" },

                { voca: "釣---出", tv: "おつり-(が)-で(ます) điếu-xuất" },

                { voca: "歩", tv: "ある(きます) bộ" },

                { voca: "渡", tv: "わた(ります) độ" },

                { voca: "橋--渡", tv: "はし-(を)-わた(ります) kiều-độ" },

                { voca: "曲", tv: "まが(ります) khúc" },

                { voca: "右--曲", tv: "みぎ-(へ)-まが(ります) hữu-khúc" },

                { voca: "寂", tv: "さびしい tịch" },

                { voca: "湯", tv: "おゆ thang" },

                { voca: "音", tv: "おと âm" },

                { voca: "故障", tv: "こしょう cố-chướng" },

                { voca: "道", tv: "みち đạo" },

                { voca: "交差点", tv: "こうさてん giao-sai-điểm" },

                { voca: "信号", tv: "しんごう tín-hiệu" },

                { voca: "角", tv: "かど giác" },

                { voca: "橋", tv: "はし kiều" },

                { voca: "駐車場", tv: "ちゅうしゃじょう trú-xa-trường" },

                { voca: "建物", tv: "たてもの kiến-vật" },

                { voca: "何回", tv: "なんかい hà-hồi" },

                { voca: "目", tv: "～め mục" },

                { voca: "一目", tv: "ひとつめ nhất-mục" },

            ];

                        
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
