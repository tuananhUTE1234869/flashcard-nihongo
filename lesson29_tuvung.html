<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG29</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

                let lesson3 = [
                    { voca: "あきます", tv: "mở" },
                    { voca: "ドアがあきます", tv: "cửa (đang) mở" },

                    { voca: "しまります", tv: "đóng" },
                    { voca: "ドアがしまります", tv: "cửa (đang) đóng" },

                    { voca: "つきます", tv: "sáng, thắp sáng" },
                    { voca: "でんきがつきます", tv: "đèn sáng" },

                    { voca: "きえます", tv: "tắt" },
                    { voca: "でんきがきえます", tv: "đèn tắt" },

                    { voca: "こわれます", tv: "hỏng" },
                    { voca: "いすがこわれます", tv: "ghế hỏng" },

                    { voca: "われます", tv: "vỡ" },
                    { voca: "コップがわれます", tv: "cốc, ly vỡ" },

                    { voca: "おれます", tv: "gãy" },
                    { voca: "きがおれます", tv: "cây gãy" },

                    { voca: "やぶれます", tv: "rách" },
                    { voca: "かみがやぶれます", tv: "giấy rách" },

                    { voca: "よごれます", tv: "bẩn, dơ" },
                    { voca: "ふくがよごれます", tv: "quần áo bẩn" },

                    { voca: "つきます", tv: "có gắn, gắn kèm" },
                    { voca: "ポケットがつきます", tv: "có túi" },

                    { voca: "はずれます", tv: "tuột, bung, rời ra" },
                    { voca: "ボタンがはずれます", tv: "nút bị bung, tuột nút" },

                    { voca: "とまります", tv: "dừng, đậu" },
                    { voca: "くるまがとまります", tv: "ô tô (đang) đậu" },

                    { voca: "まちがえます", tv: "nhầm lẫn, sai" },

                    { voca: "おとします", tv: "đánh rơi, làm rớt" },

                    { voca: "かかります", tv: "được khóa, đóng (khóa)" },
                    { voca: "かぎがかかります", tv: "khóa cửa" },

                    { voca: "ふきます", tv: "lau, chùi" },

                    { voca: "とりかえます", tv: "đổi, thay thế" },

                    { voca: "かたづけます", tv: "sắp xếp, dọn dẹp" },

                    { voca: "おさら", tv: "cái đĩa" },

                    { voca: "おちゃわん", tv: "cái chén" },

                    { voca: "コップ", tv: "cái cốc, ly" },

                    { voca: "ガラス", tv: "tấm kính, thủy tinh" },

                    { voca: "ふくろ", tv: "bao, túi" },

                    { voca: "しょるい", tv: "giấy tờ" },

                    { voca: "えだ", tv: "cành cây" },

                    { voca: "えきいん", tv: "nhân viên nhà ga" },

                    { voca: "こうばん", tv: "đồn cảnh sát" },

                    { voca: "スピーチ", tv: "bài phát biểu, diễn văn" },

                    { voca: "スピーチをします", tv: "đọc bài diễn văn" },

                    { voca: "へんじ", tv: "sự trả lời, phản hồi" },

                    { voca: "へんじをします", tv: "trả lời" },

                    { voca: "おさきにどうぞ。", tv: "Mời anh/chị đi trước." },

                    { voca: "げんじものがたり", tv: "Truyện Genji" },

                    { voca: "いまのでんしゃ", tv: "chuyến xe điện vừa rồi" },

                    { voca: "わすれもの", tv: "đồ để quên" },

                    { voca: "このくらい", tv: "khoảng chừng này" },

                    { voca: "～がわ", tv: "bên, phía ~" },

                    { voca: "ポケット", tv: "cái túi (áo, quần)" },

                    { voca: "～へん", tv: "vùng/chỗ/khu vực ~" },

                    { voca: "おぼえていません。", tv: "Tôi không nhớ." },

                    { voca: "あみだな", tv: "giá để hành lý" },

                    { voca: "たしか", tv: "chính xác là, đúng là" },

                    { voca: "ああ、よかった。", tv: "May quá!" },

                    { voca: "しんじゅく", tv: "Shinjuku (Tokyo)" },

                    { voca: "じしん", tv: "động đất" },

                    { voca: "かべ", tv: "bức tường" },

                    { voca: "はり", tv: "kim đồng hồ, cây kim" },

                    { voca: "さします", tv: "chỉ" },

                    { voca: "えきまえ", tv: "trước nhà ga" },

                    { voca: "たおれます", tv: "ngã, đổ" },

                    { voca: "にし", tv: "phía tây" },

                    { voca: "～のほう", tv: "bên ~" },

                    { voca: "もえます", tv: "cháy" },

                    { voca: "レポーター", tv: "phóng viên" }
                ];



            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
