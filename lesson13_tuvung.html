<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG13</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "あそびます", tv: "chơi" },
                { voca: "およぎます", tv: "bơi lội" },
                { voca: "すいえいをします", tv: "bơi lội" },
                { voca: "むかえます", tv: "đón" },
                { voca: "むかえにいく", tv: "đi đón" },
                { voca: "むかえにいる", tv: "đến đón" },
                { voca: "つかれます", tv: "mệt" },
                { voca: "けっこんします", tv: "kết hôn" },
                { voca: "けっこんしている", tv: "có vợ/chồng, đã kết hôn" },
                { voca: "かいものをします", tv: "mua sắm" },
                { voca: "しょくじをします", tv: "dùng bữa, ăn uống" },
                { voca: "さんぽします", tv: "đi dạo" },
                { voca: "こうえんをさんぽします", tv: "đi dạo công viên" },
                { voca: "たいへん(な)", tv: "vất vả, khó khăn" },
                { voca: "ほしい", tv: "muốn có" },
                { voca: "ほしくない", tv: "không muốn có" },
                { voca: "ひろい", tv: "rộng" },
                { voca: "せまい", tv: "hẹp" },
                { voca: "プール", tv: "bể bơi, hồ bơi" },
                { voca: "かわ", tv: "sông" },
                { voca: "びじゅつ", tv: "mỹ thuật" },
                { voca: "つり", tv: "(trò) câu cá" },
                { voca: "つりをします", tv: "câu cá" },
                { voca: "スキー", tv: "(môn) trượt tuyết" },
                { voca: "スキーをします", tv: "(chơi) trượt tuyết" },
                { voca: "しゅうまつ", tv: "cuối tuần" },
                { voca: "へいじつ", tv: "ngày thường" },
                { voca: "(お)しょうがつ", tv: "Tết" },
                { voca: "〜ごろ", tv: "khoảng ~ (thời điểm)" },
                { voca: "ごじごろ(に)", tv: "vào khoảng lúc 5 giờ" },
                { voca: "なにか", tv: "cái gì đó" },
                { voca: "どこか", tv: "chỗ nào đó" },
                { voca: "のどがかわきました", tv: "khát nước" },
                { voca: "おなかがすきました", tv: "đói bụng" },
                { voca: "そうしましょう", tv: "chúng ta làm vậy đi" },
                { voca: "ごちゅうもんは？", tv: "anh/chị gọi món gì ạ?" },
                { voca: "ていしょく", tv: "cơm phần" },
                { voca: "ぎゅうどん", tv: "cơm thịt bò" },
                { voca: "しょうしょうおまちください", tv: "anh/chị vui lòng đợi một chút ạ" },
                { voca: "〜でございます", tv: "là ~ (cách nói lịch sự của です)" },
                { voca: "べつべつに", tv: "riêng, riêng biệt" },
                { voca: "アキックス", tv: "Akikkusu - tên công ty giả định" },
                { voca: "おはようテレビ", tv: "tên chương trình truyền hình giả định" }
            ];


            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
