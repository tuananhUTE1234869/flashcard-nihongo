<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG24</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "くれます", tv: "cho (tôi)" },

                { voca: "あげます", tv: "cho, tặng, biếu" },

                { voca: "なおします", tv: "sửa chữa, sửa lỗi" },
                { voca: "まちがいをなおします", tv: "sửa lỗi sai" },
                { voca: "じてんしゃをなおします", tv: "sửa xe đạp" },

                { voca: "つれていきます", tv: "dẫn đi" },

                { voca: "つれてきます", tv: "dẫn đến" },

                { voca: "おくります", tv: "tiễn, gửi" },
                { voca: "ともだちをおくります", tv: "tiễn bạn" },

                { voca: "しょうかいします", tv: "giới thiệu" },

                { voca: "あんないします", tv: "dẫn đi tham quan, hướng dẫn" },

                { voca: "せつめいします", tv: "giải thích" },

                { voca: "おじいさん", tv: "ông, ông nội, ông ngoại (lịch sự)" },
                { voca: "おじいちゃん", tv: "ông, ông nội, ông ngoại (thân mật)" },

                { voca: "おばあさん", tv: "bà, bà nội, bà ngoại (lịch sự)" },
                { voca: "おばあちゃん", tv: "bà, bà nội, bà ngoại (thân mật)" },

                { voca: "じゅんび", tv: "sự chuẩn bị" },

                { voca: "ひっこし", tv: "việc chuyển nhà" },

                { voca: "おかし", tv: "bánh kẹo" },

                { voca: "ホームステイ", tv: "homestay" },

                { voca: "ぜんぶ", tv: "toàn bộ, tất cả" },

                { voca: "じぶんで", tv: "tự mình" },

                { voca: "ほかに", tv: "ngoài ra" },

                { voca: "ははのひ", tv: "Ngày của Mẹ (Ngày của Mẹ)" },
            ];



            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
