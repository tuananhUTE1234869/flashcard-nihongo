<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="style.css">

        <style>

                font-weight: 600 !important;
            }

    <body>
        <div class="title"><h1>TUVUNG</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "ここ", tv: "ở đây" },
                { voca: "ぞこ", tv: "ở đó" },
                { voca: "あそこ", tv: "ở kia" },
                { voca: "どこ", tv: "ở đâu" },
                { voca: "こちら", tv: "ở đây ls" },
                { voca: "そちら", tv: "ở đó ls" },
                { voca: "あちら", tv: "ở kia ls" },
                { voca: "どちら", tv: "ở đâu ls" },
                { voca: "きょうしつ", tv: "phòng học" },
                { voca: "しょくどう", tv: "căn tin, nhà ăn" },
                { voca: "じむしょ", tv: "văn phòng" },
                { voca: "かいぎしつ", tv: "phòng hợp" },
                { voca: "うけつけ", tv: "quầy lễ tân" },
                { voca: "ロビー", tv: "sảnh chờ" },
                { voca: "へや", tv: "căn phòng" },
                { voca: "トイレ", tv: "nhà vệ sinh" },
                { voca: "おてあらい", tv: "nhà vệ sinh" },
                { voca: "かいだん", tv: "cầu thang bộ" },
                { voca: "エレベーター", tv: "thang máy" },
                { voca: "エスカレーター", tv: "thang cuốn" },
                { voca: "じどうはんばいき", tv: "máy bán hàng tự động" },
                { voca: "でんわ", tv: "điện thoại" },
                { voca: "おくに", tv: "đất nước" },
                { voca: "かいしゃ", tv: "công ty" },
                { voca: "うち", tv: "nhà, gia đình" },
                { voca: "くつ", tv: "giày" },
                { voca: "ネクタイ", tv: "cà vạt" },
                { voca: "うりば", tv: "quầy bán hàng, gian hàng" },
                { voca: "ワイン", tv: "rượt vang" },
                { voca: "ちか", tv: "tầng hầm" },
                { voca: "～かい/がい", tv: "tầng~" },
                { voca: "いっかい", tv: "tầng 1" },
                { voca: "さんがい", tv: "tầng 3" },
                { voca: "なんがい", tv: "tầng mấy" },
                { voca: "いくら", tv: "bao nhiêu tiền" },
                { voca: "～えん", tv: "yên" },
                { voca: "～ひゃく", tv: "trăm" },
                { voca: "～せん", tv: "ngàn" },
                { voca: "～まん", tv: "chục ngàn" },
                { voca: "すみません", tv: "xin lỗi/ cho tôi xin hỏi" },
                { voca: "どうも", tv: "xin cảm ơn" },
                { voca: "いらっしゃいませ", tv: "kính chào quý khách" },
                { voca: "～みせてください", tv: "xin cho tôi xem ~" },
                { voca: "じゃ、～", tv: "vậy thì, ~" },
                { voca: "ください", tv: "bán cho tôi ~" },
                { voca: "イタリア", tv: "italia/ ý" },
                { voca: "スイス", tv: "thụy sĩ" },
                { voca: "フランス", tv: "pháp" },
                { voca: "ジャカルタ", tv: "jakarta" },
                { voca: "バンコク", tv: "bangkok" },
                { voca: "ベルリン", tv: "berlin" },
                { voca: "しんおおさか", tv: "shin osaka" },

                
                
               
            
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
            })

            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })


        </script>
    </body>
</html>
