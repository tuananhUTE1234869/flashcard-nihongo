    <body>

        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>1

                { voca: "熱", tv: "ねつがつづ(きます) nhiệt" },
                { voca: "引", tv: "ひ(きます) dẫn" },

                { voca: "冷", tv: "ひや(します) lãnh" },
                { voca: "込", tv: "こ(みます) nhập" },
                { voca: "道", tv: "みちがこ(みます) đạo" },
                { voca: "空", tv: "す(きます) không" },
                { voca: "道", tv: "みちがす(きます) đạo" },
                { voca: "出", tv: "で(ます) xuất" },
                { voca: "試合", tv: "しあいにで(ます) thí-hợp" },
                { voca: "無理", tv: "むり vô-lý" },

                { voca: "先生", tv: "せんせい tiên-sinh" },
                { voca: "火傷", tv: "やけど hỏa-thương" },
                { voca: "火傷", tv: "やけどを(します) hỏa-thương" },
                { voca: "怪我", tv: "けが quái-ngã" },
                { voca: "怪我", tv: "けがを(します) quái-ngã" },
                { voca: "咳", tv: "せき khái" },
                { voca: "咳", tv: "せきを(します) khái" },
                { voca: "咳", tv: "せきがで(ます) khái" },
                { voca: "空", tv: "そら không" },
                { voca: "太陽", tv: "たいよう thái-dương" },
                { voca: "星", tv: "ほし tinh" },
                { voca: "風", tv: "かぜ phong" },
                { voca: "東", tv: "ひがし đông" },
                { voca: "西", tv: "にし tây" },
                { voca: "南", tv: "みなみ nam" },
                { voca: "北", tv: "きた bắc" },
                { voca: "国際", tv: "こくさい quốc-tế" },
                { voca: "国際結婚", tv: "こくさいけっこん quốc-tế-kết-hôn" },

                { voca: "今夜", tv: "こんや kim-dạ" },
                { voca: "夕方", tv: "ゆうがた tịch-phương" },
                { voca: "前", tv: "まえ tiền" },
                { voca: "遅", tv: "おそ(く) trì" },
                { voca: "元気", tv: "げんき nguyên-khí" },
                { voca: "胃", tv: "い vị" },
                { voca: "星占", tv: "ほしうらない tinh-chiêm" },
                { voca: "牡牛座", tv: "おうしざ mẫu-ngưu-tọa" },
                { voca: "働", tv: "はたら(きすぎ) động" },
                { voca: "困", tv: "こま(る) khốn" },
                { voca: "宝", tv: "たから bảo" },
                { voca: "当", tv: "あ(たります) đương" },
                { voca: "宝", tv: "たからくじがあ(たります) bảo" },
                { voca: "健康", tv: "けんこう kiện-khang" },
                { voca: "恋愛", tv: "れんあい luyến-ái" },
                { voca: "恋人", tv: "こいびと luyến-nhân" },
                { voca: "石", tv: "いし thạch" }
            ];




                        
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
