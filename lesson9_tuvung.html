<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG9</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [

                { voca: "わかります", tv: "hiểu, biết" },
                { voca: "あります", tv: "có (sở hữu)" },
                { voca: "すき (な)", tv: "thích" },
                { voca: "きらい (な)", tv: "ghét" },
                { voca: "じょうず (な)", tv: "giỏi, khéo, hay, ngon" },
                { voca: "へた (な)", tv: "dở, kém, tệ" },
                { voca: "のみもの", tv: "đồ uống" },
                { voca: "りょうり", tv: "món ăn, việc nấu ăn" },
                { voca: "りょうりをする", tv: "nấu ăn" },
                { voca: "スポーツ", tv: "thể thao" },
                { voca: "スポーツをする", tv: "chơi thể thao" },
                { voca: "やきゅう", tv: "bóng chày" },
                { voca: "やきゅうをする", tv: "chơi bóng chày" },
                { voca: "ダンス", tv: "môn khiêu vũ" },
                { voca: "ダンスをする", tv: "khiêu vũ, nhảy" },
                { voca: "りょこう", tv: "chuyến du lịch" },
                { voca: "りょこうをする", tv: "đi du lịch" },
                { voca: "りょこうにいく", tv: "đi du lịch" },
                { voca: "おんがく", tv: "âm nhạc" },
                { voca: "うた", tv: "bài hát" },
                { voca: "うたをうたう", tv: "hát" },
                { voca: "クラシック", tv: "nhạc cổ điển" },
                { voca: "ジャズ", tv: "nhạc Jazz" },
                { voca: "コンサート", tv: "buổi hòa nhạc" },

                { voca: "カラオケ", tv: "karaoke" },
                { voca: "かぶき", tv: "kịch Kabuki" },
                { voca: "え", tv: "bức tranh" },
                { voca: "じ", tv: "chữ, chữ viết" },
                { voca: "かんじ", tv: "chữ Hán" },
                { voca: "ひらがな", tv: "chữ Hiragana" },
                { voca: "かたかな", tv: "chữ Katakana" },
                { voca: "ローマじ", tv: "chữ La tinh" },
                { voca: "こまかいおかね", tv: "tiền lẻ" },
                { voca: "おおきいおかね", tv: "tiền chẵn" },
                { voca: "チケット", tv: "vé" },
                { voca: "じかん", tv: "thời gian" },
                { voca: "ようじ", tv: "việc phải làm" },
                { voca: "やくそく", tv: "lời hứa, cuộc hẹn" },
                { voca: "アルバイト", tv: "việc làm thêm" },
                { voca: "ごしゅじん", tv: "chồng (người khác)" },
                { voca: "おっと", tv: "chồng tôi" },
                { voca: "しゅじん", tv: "chồng tôi" },
                { voca: "おくさん", tv: "vợ (người khác)" },
                { voca: "つま", tv: "vợ tôi" },
                { voca: "かない", tv: "vợ tôi" },
                { voca: "こども", tv: "trẻ em, con cái" },

                { voca: "よく", tv: "rõ, kỹ, chăm chỉ, thường xuyên" },
                { voca: "よくはたらく", tv: "làm việc chăm chỉ" },
                { voca: "よくねる", tv: "ngủ ngon" },
                { voca: "よくわかる", tv: "hiểu rõ, hiểu kỹ" },
                { voca: "よくやすむ", tv: "thường xuyên nghỉ" },
                { voca: "だいたい", tv: "tương đối (nhiều)" },
                { voca: "たくさん", tv: "nhiều" },
                { voca: "すこし", tv: "một chút" },
                { voca: "ぜんぜん", tv: "hoàn toàn không" },
                { voca: "はやく", tv: "nhanh" },
                { voca: "はやく", tv: "sớm" },

                { voca: "どうして", tv: "tại sao" },
                { voca: "〜から", tv: "vì~, bởi vì~" },

                { voca: "〜をかしてください", tv: "xin cho tôi mượn~" },
                { voca: "いいですよ", tv: "được chứ" },
                { voca: "ざんねんですが", tv: "tiếc thật nhưng mà~" },
                { voca: "ああ", tv: "ôi" },

                { voca: "いっしょにいかがですか", tv: "bạn có muốn cùng tôi không?" },
                { voca: "〜はちょっと…", tv: "khi muốn từ chối..." },
                { voca: "だめですか", tv: "không được à?" },

                { voca: "またこんどおねがいします", tv: "hẹn bạn lần sau nhé" }

            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
