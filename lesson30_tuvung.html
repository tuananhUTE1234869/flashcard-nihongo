<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG30</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "はります", tv: "dán" },
                { voca: "かけます", tv: "treo" },
                { voca: "かざります", tv: "trang trí" },
                { voca: "ならべます", tv: "sắp xếp, bày" },
                { voca: "うえます", tv: "trồng (cây)" },
                { voca: "もどします", tv: "để lại chỗ cũ" },
                { voca: "まとめます", tv: "tóm lại, tổng kết, tập hợp" },
                { voca: "しまいます", tv: "cất vào" },
                { voca: "きめます", tv: "quyết định" },
                { voca: "よしゅうします", tv: "soạn bài, chuẩn bị bài" },
                { voca: "ふくしゅうします", tv: "ôn tập" },
                { voca: "そのままにします", tv: "để nguyên như vậy" },

                { voca: "じゅぎょう", tv: "giờ học, tiết học" },
                { voca: "こうぎ", tv: "bài giảng (đại học)" },
                { voca: "ミーティング", tv: "cuộc họp" },
                { voca: "よてい", tv: "dự định, kế hoạch" },
                { voca: "おしらせ", tv: "thông báo" },
                { voca: "ガイドブック", tv: "sách hướng dẫn du lịch" },
                { voca: "カレンダー", tv: "lịch" },
                { voca: "ポスター", tv: "áp phích, tờ quảng cáo" },
                { voca: "よていひょう", tv: "lịch làm việc" },
                { voca: "ごみばこ", tv: "thùng rác" },
                { voca: "にんぎょう", tv: "búp bê" },
                { voca: "かびん", tv: "bình hoa" },

                { voca: "かがみ", tv: "gương soi" },
                { voca: "ひきだし", tv: "ngăn kéo" },
                { voca: "げんかん", tv: "genkan, lối vào nhà" },
                { voca: "ろうか", tv: "hành lang" },
                { voca: "かべ", tv: "bức tường" },
                { voca: "いけ", tv: "cái ao" },
                { voca: "もとのところ", tv: "chỗ ban đầu" },
                { voca: "まわり", tv: "xung quanh" },
                { voca: "まんなか", tv: "chính giữa" },
                { voca: "すみ", tv: "góc" },

                { voca: "まだ", tv: "vẫn còn, vẫn chưa" },
                { voca: "リュック", tv: "ba lô" },
                { voca: "ひじょうぶくろ", tv: "túi đồ khẩn cấp" },
                { voca: "ひじょうじ", tv: "lúc khẩn cấp" },
                { voca: "せいかつします", tv: "sinh hoạt, sống" },
                { voca: "かいちゅうでんとう", tv: "đèn pin" },
                { voca: "～とか、～とか", tv: "như là~, chẳng hạn như~" },
                { voca: "まるい", tv: "tròn" },
                { voca: "ある～", tv: "~ nọ" },
                { voca: "ゆめをみます", tv: "nằm mơ" },
                { voca: "うれしい", tv: "vui" },
                { voca: "いや（な）", tv: "ghét, không thích" },
                { voca: "すると", tv: "lập tức, ngay sau đó" },
                { voca: "めがさめます", tv: "thức giấc" }
    ];



            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
