<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI14</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "点", tv: "つ(けます) điểm" },
                { voca: "電気", tv: "でんき điện--khí" },
                { voca: "消", tv: "け(します) tiêu" },
                { voca: "扇風機", tv: "せんぷうき phiến--phong--cơ" },
                { voca: "開", tv: "あ(けます) khai" },
                { voca: "閉", tv: "し(めます) bế" },
                { voca: "窓", tv: "まど song" },
                { voca: "急", tv: "いそ(ぎます) cấp" },
                { voca: "待", tv: "ま(ちます) đãi" },
                { voca: "持", tv: "も(ちます) trì" },
                { voca: "取", tv: "と(ります) thủ" },
                { voca: "手伝", tv: "てつだ(います) thủ--truyền" },
                { voca: "呼", tv: "よ(びます) hô" },
                { voca: "話", tv: "はな(します) thoại" },
                { voca: "使", tv: "つか(います) sử" },
                { voca: "止", tv: "と(めます) chỉ" },
                { voca: "見", tv: "み(せます) kiến" },
                { voca: "教", tv: "おし(えます) giáo" },
                { voca: "住所", tv: "じゅうしょ trú--sở" },
                { voca: "座", tv: "すわ(します) tọa" },
                { voca: "立", tv: "た(ちます) lập" },
                { voca: "入", tv: "はい(ります) nhập" },
                { voca: "喫茶店", tv: "きっさてん khiết--trà--điếm" },
                { voca: "出", tv: "で(ます) xuất" },
                { voca: "降", tv: "ふ(ります) giáng" },
                { voca: "雨", tv: "あめ vũ" },
                { voca: "電気", tv: "でんき điện--khí" },
                { voca: "名前", tv: "なまえ danh--tiền" },
                { voca: "住所", tv: "じゅうしょ trú--sở" },
                { voca: "地図", tv: "ちず địa--đồ" },
                { voca: "塩", tv: "しお diêm" },
                { voca: "砂糖", tv: "さとう sa--đường" },
                { voca: "問題", tv: "もんだい vấn--đề" },
                { voca: "答", tv: "こた(え) đáp" },
                { voca: "読", tv: "よ(み) độc" },
                { voca: "方", tv: "かた phương" },
                { voca: "使い方", tv: "つかいかた sử--phương" },
                { voca: "食べ方", tv: "たべかた thực--phương" },
                { voca: "勉強", tv: "べんきょう miễn--cường" },
                { voca: "信号", tv: "しんごう tín--hiệu" },
                { voca: "右", tv: "みぎ hữu" },
                { voca: "曲", tv: "ま(がる) khúc" },
                { voca: "願", tv: "ねが(う) nguyện" },
                { voca: "釣", tv: "(お)つり điếu" },
                { voca: "町", tv: "ちょう đinh" }
            ];
            
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
