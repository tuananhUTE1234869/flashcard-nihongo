<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG2</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
        </div>
        <script>
            // tạo thẻ 
            

           const lesson3 = [
                { voca: "これ", tv: "cái này" },
                { voca: "それ", tv: "cái đó" },
                { voca: "あれ", tv: "cái kia" },
                { voca: "この", tv: "~ này" },
                { voca: "このかぎ", tv: "chìa khóa này" },
                { voca: "その", tv: "~ đó" },
                { voca: "そのかさ", tv: "cây dù đó" },
                { voca: "あの", tv: "~ kia" },
                { voca: "あのひと", tv: "người kia" },

                { voca: "ほん", tv: "sách" },
                { voca: "じしょ", tv: "từ điển" },
                { voca: "ざっし", tv: "tạp chí" },
                { voca: "けいざいのざっし", tv: "tạp chí kinh tế" },
                { voca: "しんぶん", tv: "báo" },
                { voca: "えいごのしんぶん", tv: "báo tiếng Anh" },

                { voca: "ノート", tv: "vở" },
                { voca: "てちょう", tv: "sổ tay" },
                { voca: "めいし", tv: "danh thiếp" },
                { voca: "カード", tv: "thẻ" },
                { voca: "えんぴつ", tv: "bút chì" },
                { voca: "ボールペン", tv: "bút bi" },
                { voca: "シャープペンシル", tv: "bút chì bấm" },

                { voca: "かぎ", tv: "chìa khóa" },
                { voca: "バイクのかぎ", tv: "chìa khóa xe máy" },
                { voca: "とけい", tv: "đồng hồ" },
                { voca: "かさ", tv: "cái dù" },
                { voca: "かばん", tv: "cặp, túi xách" },

                { voca: "シーディー", tv: "CD" },
                { voca: "テレビ", tv: "ti vi" },
                { voca: "ラジオ", tv: "radio" },
                { voca: "カメラ", tv: "máy ảnh" },
                { voca: "コンピューター", tv: "máy vi tính" },

                { voca: "くるま", tv: "xe hơi" },
                { voca: "じどうしゃ", tv: "xe hơi" },
                { voca: "つくえ", tv: "bàn" },
                { voca: "いす", tv: "ghế" },

                { voca: "チョコレート", tv: "sô cô la" },
                { voca: "コーヒー", tv: "cà phê" },

                { voca: "おみやげ", tv: "quà" },
                { voca: "えいご", tv: "tiếng Anh" },
                { voca: "にほんご", tv: "tiếng Nhật" },
                { voca: "〜ご", tv: "tiếng ~" },
                { voca: "なにご", tv: "tiếng gì" },
                { voca: "なん", tv: "cái gì" },

                { voca: "そう", tv: "đúng vậy" },
                { voca: "あのう", tv: "à... (ngập ngừng)" },
                { voca: "えっ", tv: "ủa? hả?" },
                { voca: "どうぞ", tv: "xin mời" },
                { voca: "どうもありがとうございます", tv: "xin cảm ơn nhiều" },
                { voca: "そうですか", tv: "vậy à" },
                { voca: "ちがいます", tv: "không phải" },
                { voca: "あ", tv: "a!" },

                { voca: "これからおせわになります", tv: "từ nay mong được giúp đỡ" },
                { voca: "こちらこそよろしくおねがいします", tv: "chính tôi mới mong được giúp đỡ" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })


        </script>
    </body>
</html>
