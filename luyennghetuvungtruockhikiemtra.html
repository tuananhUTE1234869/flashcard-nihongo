<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Luyện nói</title>

    <style>
        body{
        display: flex;
        flex-direction: column;
        position: relative;
        max-width: 100vw;
        max-height: 100vh;
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        color: black;
        font-family: Arial, Helvetica, sans-serif;
        }

        button{
            padding:15px 30px;
            font-size:20px;
            cursor:pointer;
        }

        #question{
            margin-top:30px;
            font-size:30px;
        }
        .tilte {
            /* background-color: red; */
            width: 100%;
            height: 300px;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mode-question{
            display: flex;
            width: 100%;
            height: 100px;
            /* background-color: red */
        }
        .word {
            border: 2px solid black;
            width: 50%;
            height: 100%;
            font-size: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bt{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 200px;
            /* background-color: red; */
        }
        .bt > button {
            width: 30%;
            height: 30%;
            font-size: 20px;
            font-weight: 600;
        }

        .box-return {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 10%;
            width: 100px;
            height: 30px;
            background-color: #ddd;
            border-radius: 3px;
            border: 1px solid black;
        }
        .cauhoi {
            margin-top: 20px;
            margin-left: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 30px;
            background-color: #ddd;
            border: 1px solid black;
        }
        .so {
            margin-top: 20px;
            margin-left: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 30px;
            background-color: #ddd;
            border: 1px solid black;
        }
        .password {
            position: absolute;
            display:   none;
            justify-content: center;
            align-items: center;
            background-color: #5f8c9ebe;
            width: 100%;
            height: 100%;
        }
        .box-input {
            font-size: 50px;
            display: flex;
            background-color: white;
            width: 50%;
            height: 50%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .box-input  > button {
            margin-top: 40px;
            font-size: 30px;
            border-radius: 10px;
        }
        .box-input  > input {
            box-sizing: border-box;
            margin-top: 40px;
            width: 80%;
            height: 50px;
            border: 1px solid black;
            padding-left: 100px;
            font-size: 30px;
        }
    </style>
</head>
    <body>
        <div class="password">
            <div class="box-input">
                Nhập pass <input id="passtk" type="number">
                <button type="submit" id="bt-pass" onclick="callpass()">Submid</button>
                <button class="exitpass" onclick="exitpass()">Exit</button>
            </div>
        </div>
        <div class="tilte">
            <h1>KIỂM TRA TỪ VỰNG</h1>
        </div>
        
        <div class="mode-question">
            <div class="word10 word">
                10 từ
            </div>
            <div class="wordfull word">
                full bài
            </div>
        </div>
        <div class="runaudio bt">
            <button onclick="startVoca()">
                Câu hỏi ngẫu nhiên
            </button>
        </div>
        <!-- <div class="stop bt">
            <button onclick="stopVoca()">
                Ngừng
            </button>
        </div> -->
        <div id="question"></div>
        <div class="box-return">Home</div>
        <div onclick="box_pass()" class="cauhoi">
            Câu hỏi
        </div>
        <div class="so">
            Nghe số
        </div>
        <!-- code javascrip -->
        <script>

            // qua trang hội thoại
            function callpass(){
                let key = 4869;
                let valueinput = document.getElementById("passtk");
                let sspass = valueinput.value.trim();

                if (Number(sspass) === key){
                    window.location.href = "kttuvung_new.html";
                }else{
                    valueinput.value="";
                    valueinput.focus();
                }
                
            }
            function exitpass(){
                document.querySelector(".password").style.display="none";
            }
            function box_pass() {
                document.querySelector(".password").style.display="flex";

            }

            //quay về home
            const home = document.querySelector(".box-return")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
        // từ vựng bài 8
        
            const questions = [
                "かんがえます",
                "かんがえかた",
                "つきます",
                "とります",

                "たります",
                "いなか",

                "とかい",

                "チャンス",

                "おく",
                "いちおくえん",
                "じゅうおく",

                "たら",
                "チャンスがあったら",

                "いみ",
                "いみをしらべます",

                "もしもし",

                "てんきん",
                "てんきんします",

                "こと",

                "ひま",

                "がんばります",
                "がんばってください",

                "どうぞおげんきで",

            ];


            let a=questions.length;
            console.log(a);
            // chọn chế độ hỏi
            const question_10 = document.querySelector(".word10")  
            const question_full = document.querySelector(".wordfull")  

            let kt_10 = 1;
            let kt_full = 0;
            let random10 = [];
            let sp = 1;

            // funciton hiện màu chết độ 
            function mode_word(){
                if (kt_10 == 1 && kt_full == 0){
                    question_10.style.backgroundColor = "red";
                }else question_10.style.backgroundColor = "white";

                if (kt_10 == 0 && kt_full == 1){
                    question_full.style.backgroundColor = "red";
                }else question_full.style.backgroundColor = "white";
            }
            mode_word();

            // sự kiện chọn chế độ
            question_10.addEventListener("click", function(){
                kt_10 = 1;
                kt_full = 0;
                sp = 1;
                mode_word();
                
            })
            question_full.addEventListener("click", function(){
                kt_10 = 0;
                kt_full = 1;
                sp = 2;
                mode_word();
                
            })
            

            // random 10 phần tử không trùng
            function random_10(){
                random10 = [...questions]
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 10);

                console.log(random10);
            }



            let isRunning = false;

            // array tạm để tránh lặp
            let remainingQuestions = [];

            function speakWord(word, callback, count = 0) {

                const speech = new SpeechSynthesisUtterance(word);

                speech.lang = "ja-JP";
                speech.rate = 1;

                speechSynthesis.speak(speech);

                // đọc 3 lần
                if (count < 2) {

                    setTimeout(() => {
                        speakWord(word, callback, count + 1);
                    }, sp*1000);

                } else {

                    // xong 3 lần -> qua từ mới
                    setTimeout(() => {
                        callback();
                    }, sp*1000);
                }
            }

            function nextWord() {

                if (!isRunning) return;

                // hết từ -> tự dừng
                if (remainingQuestions.length === 0) {

                    isRunning = false;

                    console.log("Đọc xong toàn bộ");

                    return;
                }

                // random không trùng
                const randomIndex =
                    Math.floor(Math.random() * remainingQuestions.length);

                const word =
                    remainingQuestions.splice(randomIndex, 1)[0];

                console.log(word);

                speakWord(word, nextWord);
            }

            function startVoca() {

                if (isRunning) return;

                isRunning = true;

                // clone array gốc
                remainingQuestions = [...questions];

                nextWord();
            }



            // chuyển page luyện nghe và luyện kaiwa 
            document.querySelector(".so").addEventListener("click", function(){
                window.location.href = 'nghe.html'
                
            })




        </script>

    </body>
</html>
