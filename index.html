<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>FLASH CARD</h1></div>
        <div class="option">
            <div class="option-text">
                <div class="tuvung">
                    <div class="menu-tuvung menu">
                        <h5>Từ vựng</h5>
                        <div class="menu-tuvung-lesson">

                        </div>
                    </div>
                </div>
                <div class="kanji">
                    <div class="menu-kanji menu">
                        <h5>Kanji</h5>
                        <div class="menu-kanji-lesson">
 
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>  
        <script>

            let html = "";

            for(let i = 1; i <= 25; i++){
                html += `<li class="lesson${i}">Lesson ${i}</li>`;
            }

            document.querySelector(".menu-tuvung-lesson").innerHTML = html;

            //reset lại biến html
            html = "";
            for(let i = 1; i <= 25; i++){
                html += `<li class="kanji${i}">Kanji ${i}</li>`;
            }

            document.querySelector(".menu-kanji-lesson").innerHTML = html;



            // click mở menu tuvung
            const tuvung = document.querySelector(".menu-tuvung");
            tuvung.addEventListener("click", function(){
                document.querySelector(".menu-tuvung-lesson").style.display="flex";
            })

            // click ra ngoài -> đóng
            document.addEventListener("click", function(e){
                if(!tuvung.contains(e.target)){
                    document.querySelector(".menu-tuvung-lesson").style.display = "none";
                }
            });

            // click mở menu kanji
            const kanji = document.querySelector(".menu-kanji");
            kanji.addEventListener("click", function(){
                document.querySelector(".menu-kanji-lesson").style.display="flex";
            })

            // click ra ngoài -> đóng
            document.addEventListener("click", function(e){
                if(!kanji.contains(e.target)){
                    document.querySelector(".menu-kanji-lesson").style.display = "none";
                }
            });

            // chuyển page


            document.querySelector(".lesson1").addEventListener("click", function(){
                window.location.href = "lesson1_tuvung.html";
            })
            document.querySelector(".lesson2").addEventListener("click", function(){
                window.location.href = "lesson2_tuvung.html";
            })
            document.querySelector(".lesson3").addEventListener("click", function(){
                window.location.href = "lesson3_tuvung.html";
            })
            document.querySelector(".lesson4").addEventListener("click", function(){
                window.location.href = "lesson4_tuvung.html";
            })
            document.querySelector(".lesson5").addEventListener("click", function(){
                window.location.href = "lesson5_tuvung.html";
            })


            document.querySelector(".kanji1").addEventListener("click", function(){
                window.location.href = "kanji1.html";
            })
            
            document.querySelector(".kanji2").addEventListener("click", function(){
                window.location.href = "kanji2.html";
            })
            document.querySelector(".kanji3").addEventListener("click", function(){
                window.location.href = "kanji3.html";
            })
            
            document.querySelector(".kanji4").addEventListener("click", function(){
                window.location.href = "kanji4.html";
            })
            document.querySelector(".kanji5").addEventListener("click", function(){
                window.location.href = "kanji5.html";
            })
            
            

        </script>
    </body>
</html>
