<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG7</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

           const lesson3 = [
                { voca: "きります", tv: "cắt" },
                { voca: "おくります", tv: "gửi" },
                { voca: "あげます", tv: "cho, tặng" },
                { voca: "もらいます", tv: "nhận, được cho" },
                { voca: "かします", tv: "cho mượn" },
                { voca: "かります", tv: "mượn, thuê, vay" },
                { voca: "おしえます", tv: "dạy" },
                { voca: "ならいます", tv: "học" },
                { voca: "かけます", tv: "gọi" },
                { voca: "でんわをかけます", tv: "gọi điện thoại" },

                { voca: "て", tv: "tay" },
                { voca: "はし", tv: "đũa" },
                { voca: "スプーン", tv: "muỗng, thìa" },
                { voca: "ナイフ", tv: "dao" },
                { voca: "フォーク", tv: "nĩa, dĩa" },
                { voca: "はさみ", tv: "kéo" },
                { voca: "パソコン", tv: "máy vi tính" },
                { voca: "ケータイ", tv: "điện thoại di động" },
                { voca: "メール", tv: "mail, thư điện tử" },
                { voca: "ねんがじょう", tv: "thiệp chúc mừng năm mới" },
                { voca: "パンチ", tv: "cái đục lỗ" },
                { voca: "ホッチキス", tv: "cái bấm kim" },
                { voca: "セロテープ", tv: "băng keo dính" },
                { voca: "けしゴム", tv: "cục tẩy" },

                { voca: "かみ", tv: "giấy" },
                { voca: "はな", tv: "hoa" },
                { voca: "シャツ", tv: "áo sơ mi" },
                { voca: "プレゼント", tv: "quà, quà tặng" },
                { voca: "にもつ", tv: "đồ đạc, hành lý" },
                { voca: "おかね", tv: "tiền" },
                { voca: "きっぷ", tv: "vé" },
                { voca: "クリスマス", tv: "Giáng sinh" },

                { voca: "ちち", tv: "bố tôi" },
                { voca: "はは", tv: "mẹ tôi" },
                { voca: "おとうさん", tv: "bố (người khác)" },
                { voca: "おかあさん", tv: "mẹ (người khác)" },

                { voca: "もう", tv: "đã... rồi" },
                { voca: "まだ", tv: "chưa" },
                { voca: "これから", tv: "từ bây giờ, bây giờ" },

                { voca: "すてきですね", tv: "đẹp nhỉ" },
                { voca: "いらっしゃい", tv: "mừng bạn đến chơi" },
                { voca: "どうぞおあがりください", tv: "mời vào" },
                { voca: "しつれいします", tv: "xin phép" },
                { voca: "～はいかがですか", tv: "bạn dùng ~ nhé?" },
                { voca: "いただきます", tv: "xin phép được dùng" },
                { voca: "ごちそうさまでした", tv: "cảm ơn vì bữa ăn" },

                { voca: "スペイン", tv: "Tây Ban Nha" },
                { voca: "しゅうせいペン", tv: "bút xóa" },
                { voca: "えんぴつけずり", tv: "đồ gọt bút chì" },
                { voca: "リモコン", tv: "thiếu bị điều khiển từ xa" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
