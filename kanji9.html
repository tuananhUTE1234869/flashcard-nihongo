<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI9</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [

                { voca: "分", tv: "わ (かる) phân" },
                { voca: "好", tv: "す (き) hảo" },
                { voca: "嫌", tv: "きら (い) hiềm" },
                { voca: "上手", tv: "じょう--ず thượng--thủ" },
                { voca: "下手", tv: "へ--た hạ--thủ" },

                { voca: "飲物", tv: "の (み) もの ẩm--vật" },
                { voca: "料理", tv: "りょう--り liệu--lí" },

                { voca: "野球", tv: "や--きゅう dã--cầu" },

                { voca: "旅行", tv: "りょ--こう lữ--hành" },


                { voca: "音楽", tv: "おん--がく âm--nhạc" },
                { voca: "歌", tv: "うた ca" },


                { voca: "絵", tv: "え hội" },
                { voca: "字", tv: "じ tự" },
                { voca: "漢字", tv: "かん--じ hán--tự" },

                { voca: "細", tv: "こま (かい) tế" },
                { voca: "大", tv: "おお (きい) đại" },

                { voca: "時間", tv: "じ--かん thời--gian" },
                { voca: "用事", tv: "よう--じ dụng--sự" },

                { voca: "約束", tv: "やく--そく ước--thúc" },

                { voca: "主人", tv: "ご--しゅ--じん chủ--nhân" },
                { voca: "夫", tv: "おっと phu" },

                { voca: "奥", tv: "おく áo" },
                { voca: "妻", tv: "つま thê" },
                { voca: "家内", tv: "か--ない gia--nội" },

                { voca: "子供", tv: "こ--ども tử--cung" },

                { voca: "働", tv: "はたら (く) động" },
                { voca: "寝", tv: "ね (る) tẩm" },

                { voca: "休", tv: "やす (む) hưu" },
                { voca: "体", tv: "からだ thể" },

                { voca: "少", tv: "すこ (し) thiểu" },
                { voca: "全然", tv: "ぜん--ぜん toàn--nhiên" },

                { voca: "速", tv: "はや (く) tốc" },
                { voca: "早", tv: "はや (く) tảo" },

                { voca: "貸", tv: "か (す) thải" },
                { voca: "残念", tv: "ざん--ねん tàn--niệm" },

                { voca: "一緒", tv: "いっ--しょ nhất--tự" },
                { voca: "今度", tv: "こん--ど kim--độ" },

                { voca: "願", tv: "ねが (い) nguyện" }

            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
