<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG23</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "ききます", tv: "hỏi, nghe" },
                { voca: "せんせいにききます", tv: "hỏi thầy/cô giáo" },

                { voca: "まわします", tv: "vặn, xoay" },
                { voca: "ひだりへまわします", tv: "vặn/xoay qua trái" },

                { voca: "ひきます", tv: "kéo" },

                { voca: "おします", tv: "đẩy" },

                { voca: "かえます", tv: "đổi, thay đổi" },
                { voca: "かみのサイズをかえます", tv: "thay đổi cỡ giấy" },

                { voca: "さわります", tv: "sờ, chạm" },
                { voca: "ドアにさわります", tv: "chạm vào cửa" },

                { voca: "でます", tv: "ra, đi ra, chảy ra" },
                { voca: "みずがでます", tv: "nước chảy ra" },
                { voca: "おつりがでます", tv: "tiền thừa (chạy) ra" },

                { voca: "あるきます", tv: "đi bộ" },

                { voca: "わたります", tv: "băng qua" },
                { voca: "はしをわたります", tv: "băng qua cầu" },

                { voca: "まがります", tv: "rẽ, cua" },
                { voca: "みぎへまがります", tv: "rẽ phải" },

                { voca: "さびしい", tv: "buồn, cô đơn" },

                { voca: "おゆ", tv: "nước nóng" },

                { voca: "おと", tv: "âm thanh" },

                { voca: "サイズ", tv: "kích cỡ" },

                { voca: "こしょう", tv: "hỏng hóc" },

                { voca: "みち", tv: "con đường" },

                { voca: "こうさてん", tv: "ngã tư" },

                { voca: "しんごう", tv: "đèn giao thông, đèn tín hiệu" },

                { voca: "かど", tv: "góc (đường)" },

                { voca: "はし", tv: "cây cầu" },

                { voca: "ちゅうしゃじょう", tv: "bãi đậu xe" },

                { voca: "たてもの", tv: "tòa nhà" },

                { voca: "なんかいも", tv: "nhiều lần" },

                { voca: "～め", tv: "thứ ~, số ~" },

                { voca: "ひとつめ", tv: "thứ nhất" },

                { voca: "しょうとくたいし", tv: "Thái tử Shotoku" },

                { voca: "ほうりゅうじ", tv: "chùa Horyuji" },

                { voca: "げんきちゃ", tv: "trà tăng lực (tên giả định)" },

                { voca: "ほんだえき", tv: "ga Honda (tên giả định)" },

                { voca: "としょかんまえ", tv: "trước thư viện (tên trạm xe buýt)" }
            ];



            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
