<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI6</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "食", tv: "た thực" },
                { voca: "飲", tv: "の ẩm" },
                { voca: "吸", tv: "す hấp" },
                { voca: "煙草--吸", tv: "たばこ yên--thảo--hấp" },
                { voca: "見", tv: "み kiến" },
                { voca: "聞", tv: "き văn" },
                { voca: "読", tv: "よ độc" },
                { voca: "書", tv: "か thư" },
                { voca: "描", tv: "か miêu" },
                { voca: "買", tv: "か mãi" },
                { voca: "撮", tv: "と toát" },
                { voca: "写真--撮", tv: "しゃしん--と tả--chân--toát" },
                { voca: "会", tv: "あ hội" },

                { voca: "友達--会", tv: "とも--だち--あ hữu--đạt--hội" },
                { voca: "朝--飯", tv: "あさ--はん triêu--phạn" },
                { voca: "昼--飯", tv: "ひる--はん trưa--phạn" },
                { voca: "晩--飯", tv: "ばん--はん vãn--phạn" },

                { voca: "卵", tv: "たまご noãn" },
                { voca: "肉", tv: "にく nhục" },
                { voca: "魚", tv: "さかな ngư" },
                { voca: "野菜", tv: "や--さい dã--thái" },
                { voca: "果物", tv: "くだ--もの quả--vật" },
                { voca: "水", tv: "みず thủy" },
                { voca: "茶", tv: "ちゃ trà" },
                { voca: "紅茶", tv: "こう--ちゃ hồng--trà" },
                { voca: "牛乳", tv: "ぎゅう--にゅう ngưu--nhũ" },
                { voca: "酒", tv: "さけ tửu" },
                { voca: "手紙", tv: "て--がみ thủ--chi" },

                { voca: "店", tv: "みせ điếm" },
                { voca: "庭", tv: "にわ đình" },
                { voca: "宿題", tv: "しゅく--だい túc--đề" },

                { voca: "花見", tv: "はな--み hoa--kiến" },
                { voca: "何", tv: "なに hà" },
                { voca: "一緒", tv: "いっ--しょ nhất--tự" },
                { voca: "時々", tv: "とき--どき thời--thời" },
                { voca: "分", tv: "わ phân" },
                { voca: "明日", tv: "あした minh--nhật" },
                { voca: "大阪", tv: "おお--さか đại--phản" },
                { voca: "毎日屋", tv: "まい--にち--や mỗi--nhật--ốc" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
