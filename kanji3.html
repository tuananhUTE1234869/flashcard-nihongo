<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI3</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "教室", tv: "きょう--しつ giáo--thất" },
                { voca: "食堂", tv: "しょく--どう thực--đường" },
                { voca: "事務所", tv: "じ--む--しょ sự--vụ--sở" },
                { voca: "会議室", tv: "かい--ぎ--しつ hội--nghị--thất" },
                { voca: "受付", tv: "うけ--つけ thụ--phó" },
                { voca: "部屋", tv: "へ--や bộ--ốc" },
                { voca: "手洗", tv: "て--あら thủ--tẩy" },
                { voca: "階段", tv: "かい--だん giai--đoạn" },
                { voca: "電話", tv: "でん--わ điện--thoại" },
                { voca: "国", tv: "くに quốc" },
                { voca: "会社", tv: "かい--しゃ hội--xã" },
                { voca: "自動販売機", tv: "じ--どう--はん--ばい--き tự--động--phiến--mại--cơ" },
                { voca: "家", tv: "うち gia" },
                { voca: "靴", tv: "くつ ngoa" },
                { voca: "売場", tv: "う--ば mại--trường" },
                { voca: "地下", tv: "ち--か địa--hạ" },
                { voca: "階", tv: "かい/がい giai" },
                { voca: "何", tv: "なん hà" },
                { voca: "円", tv: "えん viên" },
                { voca: "百", tv: "ひゃく bách" },
                { voca: "千", tv: "せん thiên" },
                { voca: "万", tv: "まん vạn" },
                { voca: "見", tv: "み kiến" },
                { voca: "新大阪", tv: "しん--おお--さか tân--đại--phản" }
            
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })


        </script>
    </body>
</html>
