<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG25</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "かんがえます", tv: "suy nghĩ" },
                { voca: "かんがえかた", tv: "cách suy nghĩ" },

                { voca: "つきます", tv: "đến nơi" },
                { voca: "えきにつきます", tv: "đến ga" },

                { voca: "とります", tv: "lấy, cầm, trở nên" },
                { voca: "としをとります", tv: "về già, có tuổi" },

                { voca: "たります", tv: "đủ, không thiếu" },
                { voca: "おかねがたりません", tv: "không đủ tiền" },

                { voca: "いなか", tv: "làng quê, nông thôn" },
                { voca: "いなかにすみます", tv: "sống ở nông thôn" },

                { voca: "とかい", tv: "đô thị, thành thị" },

                { voca: "チャンス", tv: "cơ hội" },
                { voca: "チャンスがありません", tv: "không có cơ hội" },

                { voca: "～おく", tv: "~ trăm triệu" },
                { voca: "いちおくえん", tv: "một trăm triệu Yên" },
                { voca: "じゅうおく", tv: "một tỷ" },

                { voca: "～たら", tv: "nếu ~ thì ~" },
                { voca: "チャンスがあったら", tv: "nếu có cơ hội" },

                { voca: "いみ", tv: "ý nghĩa" },
                { voca: "いみをしらべます", tv: "tra nghĩa, dò nghĩa" },

                { voca: "もしもし", tv: "a lô" },

                { voca: "てんきん", tv: "việc chuyển công tác" },
                { voca: "てんきんします", tv: "chuyển công tác" },

                { voca: "こと", tv: "việc, chuyện, kỷ niệm" },

                { voca: "ひま", tv: "thời gian rảnh" },

                { voca: "（いろいろ）おせわになりました", tv: "(Tôi) đã được bạn giúp đỡ rất nhiều" },

                { voca: "がんばります", tv: "cố gắng" },
                { voca: "がんばってください", tv: "hãy cố gắng nhé" },

                { voca: "どうぞおげんきで", tv: "chúc bạn giữ gìn sức khỏe" },

                { voca: "ベトナム", tv: "Việt Nam" },
            ];



            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
