<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI28</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            let lesson3 = [
                { voca: "売", tv: "う(れます) mại" },
                { voca: "パン--売", tv: "パン-(が)-う(れます) mại" },

                { voca: "踊", tv: "おど(ります) dũng" },

                { voca: "噛", tv: "か(みます) giảo" },

                { voca: "選", tv: "えら(びます) tuyển" },

                { voca: "通", tv: "かよ(います) thông" },
                { voca: "大学--通", tv: "だいがく-(に)-かよ(います) đại-học-thông" },


                { voca: "真面目", tv: "まじめ(な) chân-diện-mục" },

                { voca: "熱心", tv: "ねっしん(な) nhiệt-tâm" },

                { voca: "偉", tv: "えら(い) vĩ" },

                { voca: "丁度", tv: "ちょうど vừa-độ" },

                { voca: "景色", tv: "けしき cảnh-sắc" },

                { voca: "美容院", tv: "びよういん mỹ-dung-viện" },

                { voca: "台所", tv: "だいどころ đài-sở" },

                { voca: "経験", tv: "けいけん kinh-nghiệm" },
                { voca: "経験--", tv: "けいけん-(が)-あります kinh-nghiệm" },
                { voca: "経験--", tv: "けいけん-(を)-します kinh-nghiệm" },

                { voca: "力", tv: "ちから lực" },

                { voca: "人気", tv: "にんき nhân-khí" },
                { voca: "学生--人気", tv: "がくせい-(に)-にんき-(が)-あります học-sinh-nhân-khí" },

                { voca: "形", tv: "かたち hình" },

                { voca: "色", tv: "いろ sắc" },

                { voca: "味", tv: "あじ vị" },

                { voca: "品物", tv: "しなもの phẩm-vật" },

                { voca: "値段", tv: "ねだん trị-đoạn" },

                { voca: "給料", tv: "きゅうりょう cấp-liệu" },

                { voca: "番組", tv: "ばんぐみ phiên-tổ" },

                { voca: "歌手", tv: "かしゅ ca-thủ" },

                { voca: "小説", tv: "しょうせつ tiểu-thuyết" },

                { voca: "小説家", tv: "しょうせつか tiểu-thuyết-gia" },

                { voca: "家", tv: "～や gia" },

                { voca: "機", tv: "～き cơ" },

                { voca: "息子", tv: "むすこ tức-tử" },
                { voca: "息子", tv: "むすこさん tức-tử" },

                { voca: "娘", tv: "むすめ nương" },
                { voca: "娘", tv: "むすめさん nương" },

                { voca: "自分", tv: "じぶん tự-phân" },

                { voca: "将来", tv: "しょうらい tướng-lai" },

                { voca: "実", tv: "じつ thực" },

                { voca: "会話", tv: "かいわ hội-thoại" },

                { voca: "知", tv: "し(らせ) tri" },

                { voca: "参加", tv: "さんか(します) tham-gia" },

                { voca: "日", tv: "ひ nhật" },

                { voca: "体育館", tv: "たいいくかん thể-dục-quán" },

                { voca: "無料", tv: "むりょう vô-liệu" },

                { voca: "誘", tv: "さそ(います) dụ" },

                { voca: "願", tv: "おねが(い) nguyện" }
            ];
                        
            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
