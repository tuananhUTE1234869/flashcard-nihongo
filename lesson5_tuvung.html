<html>

    <body>
        <div class="title"><h1>TUVUNG5</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [

                { voca: "ちかてつ", tv: "tàu điện ngầm" },

                { voca: "バス", tv: "xe buýt" },
                { voca: "タクシー", tv: "taxi" },

                { voca: "ひと", tv: "người" },
                { voca: "ともだち", tv: "bạn bè" },
                { voca: "かれ", tv: "anh ấy, người yêu (nam)" },
                { voca: "かのじょ", tv: "cô ấy, người yêu (nữ)" },
                { voca: "かぞく", tv: "gia đình" },
                { voca: "ひとりで", tv: "một mình" },
                { voca: "せんしゅう", tv: "tuần trước" },
                { voca: "こんしゅう", tv: "tuần này" },
                { voca: "らいしゅう", tv: "tuần sau" },

                { voca: "せんげつ", tv: "tháng trước" },
                { voca: "こんげつ", tv: "tháng này" },
                { voca: "らいげつ", tv: "tháng sau" },
                { voca: "きょねん", tv: "năm ngoái" },
                { voca: "ことし", tv: "năm nay" },
                { voca: "らいねん", tv: "năm sau" },
                { voca: "ねん", tv: "năm ~" },
                { voca: "なんねん", tv: "năm mấy, mấy năm" },
                { voca: "がつ", tv: "tháng ~" },
                { voca: "しがつ", tv: "tháng 4" },
                { voca: "しちがつ", tv: "tháng 7" },
                { voca: "くがつ", tv: "tháng 9" },
                { voca: "なんがつ", tv: "tháng mấy" },

                { voca: "ついたち", tv: "ngày 1" },
                { voca: "いちにち", tv: "1 ngày" },
                { voca: "ふつか", tv: "ngày 2, 2 ngày" },
                { voca: "みっか", tv: "ngày 3, 3 ngày" },
                { voca: "よっか", tv: "ngày 4, 4 ngày" },
                { voca: "いつか", tv: "ngày 5, 5 ngày" },
                { voca: "むいか", tv: "ngày 6, 6 ngày" },
                { voca: "なのか", tv: "ngày 7, 7 ngày" },
                { voca: "ようか", tv: "ngày 8, 8 ngày" },
                { voca: "ここのか", tv: "ngày 9, 9 ngày" },
                { voca: "とおか", tv: "ngày 10, 10 ngày" },
                { voca: "じゅうよっか", tv: "ngày 14, 14 ngày" },
                { voca: "はつか", tv: "ngày 20, 20 ngày" },

                { voca: "にじゅうよっか", tv: "ngày 24, 24 ngày" },
                { voca: "にち", tv: "ngày ~, ~ ngày" },
                { voca: "じゅうしちにち", tv: "ngày 17, 17 ngày" },
                { voca: "じゅうくにち", tv: "ngày 19, 19 ngày" },
                { voca: "さんじゅうにち", tv: "ngày 30, 30 ngày" },
                { voca: "さんじゅういちにち", tv: "ngày 31, 31 ngày" },
                { voca: "なんにち", tv: "ngày mấy, mấy ngày" },
                { voca: "いつ", tv: "khi nào" },
                { voca: "たんじょうび", tv: "sinh nhật" },
                { voca: "そうですね", tv: "ừ nhỉ / đúng rồi nhỉ" },
                { voca: "どうもありがとうございました", tv: "cảm ơn bạn rất nhiều" },
                { voca: "どういたしまして", tv: "không có gì" },
                { voca: "ばんせん", tv: "tuyến (tàu) số ~" },
                { voca: "つぎの", tv: "~ tiếp theo, ~ kế tiếp" },
                { voca: "ふつう", tv: "tàu thường" },
                { voca: "きゅうこう", tv: "tàu nhanh" },
                { voca: "とっきゅう", tv: "tàu tốc hành" },
                { voca: "こうしえん", tv: "khu phố Koshien (Osaka)" },
                { voca: "おおさかじょう", tv: "lâu đài Osaka" }
                ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })


        </script>
    </body>
</html>
