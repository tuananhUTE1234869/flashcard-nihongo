<!DOCTYPE html>
<html>

    <body>

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
        </div>
        <script>
            // tạo thẻ

                { voca: "ぱーてぃーをします", tv: "tổ chức tiệc" },
                { voca: "あいます", tv: "gặp" },
                { voca: "ともだちにあいます", tv: "gặp bạn bè" },
                { voca: "ごはん", tv: "cơm, bữa cơm" },
                { voca: "あさごはん", tv: "bữa sáng" },
                { voca: "ひるごはん", tv: "bữa trưa" },
                { voca: "ばんごはん", tv: "bữa tối" },
                { voca: "ぱん", tv: "bánh mì" },
                { voca: "たまご", tv: "trứng" },

                { voca: "にく", tv: "thịt" },
                { voca: "さかな", tv: "cá" },
                { voca: "やさい", tv: "rau" },
                { voca: "くだもの", tv: "trái cây" },
                { voca: "みず", tv: "nước" },
                { voca: "おちゃ", tv: "trà (xanh)" },
                { voca: "こうちゃ", tv: "trà đen" },
                { voca: "ぎゅうにゅう", tv: "sữa bò" },
                { voca: "みるく", tv: "sữa" },
                { voca: "じゅーす", tv: "nước trái cây, nước ngọt" },
                { voca: "びーる", tv: "bia" },
                { voca: "おさけ", tv: "rượu, sake" },
                { voca: "たばこ", tv: "thuốc lá" },
                { voca: "てがみ", tv: "thư" },
                { voca: "れぽーと", tv: "bài báo cáo" },
                { voca: "しゃしん", tv: "ảnh" },
                { voca: "びでお", tv: "video" },
                { voca: "みせ", tv: "cửa hàng" },
                { voca: "にわ", tv: "sân, vườn" },
                { voca: "しゅくだい", tv: "bài tập về nhà" },
                { voca: "しゅくだいをする", tv: "làm bài tập" },
                { voca: "てにす", tv: "tennis" },
                { voca: "てにすをする", tv: "chơi tennis" },
                { voca: "さっかー", tv: "bóng đá" },
                { voca: "さっかーをする", tv: "chơi bóng đá" },
                { voca: "おはなみ", tv: "ngắm hoa anh đào" },

                { voca: "おはなみをする", tv: "đi ngắm hoa, ăn uống" },
                { voca: "なに", tv: "cái gì" },
                { voca: "いっしょに", tv: "cùng nhau" },
                { voca: "ちょっと", tv: "một chút" },
                { voca: "いつも", tv: "luôn, thường xuyên" },
                { voca: "ときどき", tv: "thỉnh thoảng" },
                { voca: "それから", tv: "sau đó" },
                { voca: "ええ", tv: "ừ, vâng" },
                { voca: "いいですね", tv: "hay quá, được đấy" },
                { voca: "わかりました", tv: "tôi hiểu rồi" },
                { voca: "なんですか", tv: "có chuyện gì?" },
                { voca: "じゃまたあした", tv: "hẹn gặp lại ngày mai" },
                { voca: "めきしこ", tv: "mê hi cô" },
                { voca: "おおさかでぱーと", tv: "trung tâm thương mại Osaka" },
                { voca: "つるや", tv: "cửa hàng Tsuraya" },
                { voca: "ふらんすや", tv: "cửa hàng France" },
                { voca: "まいにちや", tv: "cửa hàng Mainichi" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })


        </script>
    </body>
</html>
