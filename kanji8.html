<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI8</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            
            let lesson3 = [
                { voca: "静", tv: "し (ずか) tĩnh" },
                { voca: "賑", tv: "にぎ (やか) chấn" },
                { voca: "有名", tv: "ゆう--めい hữu--danh" },
                { voca: "親切", tv: "しん--せつ thân--thiết" },
                { voca: "元気", tv: "げん--き nguyên--khí" },
                { voca: "暇", tv: "ひま hạ" },
                { voca: "便利", tv: "べん--り tiện--lợi" },
                { voca: "素敵", tv: "す (てき) tố--địch" },

                { voca: "大", tv: "おお (きい) đại" },
                { voca: "小", tv: "ちい (さい) tiểu" },
                { voca: "新", tv: "あたら (しい) tân" },
                { voca: "古", tv: "ふる (い) cổ" },
                { voca: "良", tv: "い (い) lương" },
                { voca: "悪", tv: "わる (い) ác" },

                { voca: "暑", tv: "あつ (い) thử" },
                { voca: "熱", tv: "あつ (い) nhiệt" },
                { voca: "寒", tv: "さむ (い) hàn" },
                { voca: "冷", tv: "つめ (たい) lãnh" },

                { voca: "難", tv: "むずか (しい) nan" },
                { voca: "易", tv: "やさ (しい) dịch" },
                { voca: "優", tv: "やさ (しい) ưu" },

                { voca: "高", tv: "たか (い) cao" },
                { voca: "背", tv: "せ bối" },
                { voca: "安", tv: "やす (い) an" },
                { voca: "低", tv: "ひく (い) đê" },

                { voca: "面白", tv: "おも--しろ (い) diện--bạch" },
                { voca: "美味", tv: "お--い (しい) mỹ--vị" },
                { voca: "不味", tv: "まず (い) bất--vị" },

                { voca: "忙", tv: "いそが (しい) mang" },
                { voca: "楽", tv: "たの (しい) lạc" },

                { voca: "白", tv: "しろ (い) bạch" },
                { voca: "黒", tv: "くろ (い) hắc" },
                { voca: "赤", tv: "あか (い) xích" },
                { voca: "青", tv: "あお (い) thanh" },

                { voca: "桜", tv: "さくら anh" },
                { voca: "山", tv: "やま sơn" },
                { voca: "町", tv: "まち đinh" },
                { voca: "食物", tv: "た (べ) もの thực--vật" },
                { voca: "所", tv: "ところ sở" },   
                { voca: "寮", tv: "りょう liêu" },

                { voca: "生活", tv: "せい--かつ sinh--hoạt" },
                { voca: "仕事", tv: "し--ごと sĩ/sỹ--sự" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
