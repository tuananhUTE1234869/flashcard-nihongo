<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG28</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

            const lesson3 = [
                { voca: "かいます", tv: "nuôi" },
                { voca: "ペットをかいます", tv: "nuôi thú cưng" },

                { voca: "はしります", tv: "chạy" },
                { voca: "みちをはしります", tv: "chạy trên đường" },

                { voca: "みえます", tv: "nhìn thấy" },
                { voca: "やまがみえます", tv: "nhìn thấy núi" },

                { voca: "きこえます", tv: "nghe thấy" },
                { voca: "おとがきこえます", tv: "nghe thấy âm thanh" },

                { voca: "できます", tv: "hoàn thành, được xây dựng" },
                { voca: "みちができます", tv: "đường được làm xong" },

                { voca: "ひらきます", tv: "mở, khai giảng" },
                { voca: "きょうしつをひらきます", tv: "mở lớp" },

                { voca: "しんぱい(な)", tv: "lo lắng" },

                { voca: "ペット", tv: "thú cưng" },

                { voca: "とり", tv: "chim" },

                { voca: "こえ", tv: "tiếng nói, giọng nói" },

                { voca: "なみ", tv: "sóng (biển)" },

                { voca: "はなび", tv: "pháo hoa" },

                { voca: "どうぐ", tv: "dụng cụ" },

                { voca: "クリーニング", tv: "giặt ủi" },

                { voca: "いえ", tv: "nhà" },

                { voca: "マンション", tv: "chung cư" },

                { voca: "キッチン", tv: "nhà bếp" },

                { voca: "～きょうしつ", tv: "lớp học về ~" },

                { voca: "パーティールーム", tv: "phòng tổ chức tiệc" },

                { voca: "かた", tv: "ngài, vị (kính ngữ của ひと)" },

                { voca: "～ご", tv: "sau ~ (thời gian)" },

                { voca: "～しか～ない", tv: "chỉ có... mà thôi" },

                { voca: "ほかの～", tv: "~ khác" },

                { voca: "はっきり", tv: "rõ ràng" },

                { voca: "かぐ", tv: "đồ gỗ, nội thất" },

                { voca: "ほんだな", tv: "kệ sách" },

                { voca: "いつか", tv: "một ngày nào đó" },

                { voca: "たてます", tv: "xây dựng" },

                { voca: "すばらしい", tv: "tuyệt vời" },

                { voca: "こどもたち", tv: "bọn trẻ, trẻ em" },

                { voca: "だいすき(な)", tv: "rất thích" },

                { voca: "しゅじんこう", tv: "nhân vật chính" },

                { voca: "かたち", tv: "hình dạng" },

                { voca: "ふしぎ(な)", tv: "kì lạ, huyền bí" },

                { voca: "ポケット", tv: "túi (quần, áo)" },

                { voca: "たとえば", tv: "ví dụ" },

                { voca: "つけます", tv: "gắn vào, đính vào" },

                { voca: "じゆうに", tv: "một cách tự do" },

                { voca: "そら", tv: "bầu trời" },

                { voca: "とびます", tv: "bay" },

                { voca: "むかし", tv: "ngày xưa, trước đây" },

                { voca: "じぶん", tv: "chính mình" },

                { voca: "しょうらい", tv: "tương lai" },

                { voca: "ドラえもん", tv: "mèo máy Doraemon" }
            ];



            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
