<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
        <style>
            .voca {
                font-size: 30px !important;
                font-weight: 600 !important;
            }
        </style>
    </head>
    <body>
        <div class="title"><h1>TUVUNG28</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

                let lesson3 = [
                    { voca: "うれます", tv: "được bán, bán chạy" },
                    { voca: "パンがうれます", tv: "bánh mì bán chạy" },

                    { voca: "おどります", tv: "múa, nhảy múa" },

                    { voca: "かみます", tv: "nhai, cắn" },

                    { voca: "えらびます", tv: "chọn, lựa" },

                    { voca: "かよいます", tv: "đi qua lại, đi học/đi làm thường xuyên" },
                    { voca: "だいがくにかよいます", tv: "đi học đại học" },

                    { voca: "メモします", tv: "ghi chú, ghi chép" },

                    { voca: "まじめ(な)", tv: "nghiêm túc" },

                    { voca: "ねっしん(な)", tv: "nhiệt tình" },

                    { voca: "えらい", tv: "giỏi, xuất sắc" },

                    { voca: "ちょうどいい", tv: "vừa đẹp, vừa đúng" },

                    { voca: "けしき", tv: "phong cảnh" },

                    { voca: "びよういん", tv: "tiệm làm tóc" },

                    { voca: "だいどころ", tv: "nhà bếp" },

                    { voca: "けいけん", tv: "kinh nghiệm" },
                    { voca: "けいけんがあります", tv: "có kinh nghiệm" },
                    { voca: "けいけんをします", tv: "có/trải nghiệm" },

                    { voca: "ちから", tv: "sức mạnh, năng lực" },

                    { voca: "にんき", tv: "được yêu thích, nổi tiếng" },
                    { voca: "がくせいににんきがあります", tv: "được sinh viên yêu thích" },

                    { voca: "かたち", tv: "hình dạng" },

                    { voca: "いろ", tv: "màu sắc" },

                    { voca: "あじ", tv: "mùi vị, vị" },

                    { voca: "ガム", tv: "kẹo cao su" },

                    { voca: "しなもの", tv: "hàng hóa" },

                    { voca: "ねだん", tv: "giá cả" },

                    { voca: "きゅうりょう", tv: "tiền lương" },

                    { voca: "ボーナス", tv: "tiền thưởng" },

                    { voca: "ゲーム", tv: "trò chơi, game" },

                    { voca: "ばんぐみ", tv: "chương trình (TV, radio)" },

                    { voca: "ドラマ", tv: "phim truyền hình" },

                    { voca: "かしゅ", tv: "ca sĩ" },

                    { voca: "しょうせつ", tv: "tiểu thuyết" },

                    { voca: "しょうせつか", tv: "nhà văn, tiểu thuyết gia" },

                    { voca: "〜や", tv: "cửa hàng ~" },

                    { voca: "〜き", tv: "máy ~" },

                    { voca: "むすこ", tv: "con trai tôi" },
                    { voca: "むすこさん", tv: "con trai (của người khác)" },

                    { voca: "むすめ", tv: "con gái tôi" },
                    { voca: "むすめさん", tv: "con gái (của người khác)" },

                    { voca: "じぶん", tv: "tự mình, bản thân" },

                    { voca: "しょうらい", tv: "tương lai" },

                    { voca: "しばらく", tv: "một lát, một lúc; một thời gian" },

                    { voca: "だいたい", tv: "đại khái, khoảng, thông thường" },

                    { voca: "それに", tv: "ngoài ra, hơn nữa" },

                    { voca: "それで", tv: "vì vậy, vì thế" },

                    { voca: "じつは", tv: "thật ra thì" },

                    { voca: "かいわ", tv: "giao tiếp, đàm thoại" },

                    { voca: "うーん", tv: "ừm..." },

                    { voca: "おしらせ", tv: "thông báo" },

                    { voca: "さんかします", tv: "tham gia" },

                    { voca: "ひにち", tv: "ngày tháng (ngày cụ thể)" },

                    { voca: "ど", tv: "thứ Bảy" },

                    { voca: "たいいくかん", tv: "trung tâm thể dục thể thao, nhà thi đấu" },

                    { voca: "むりょう", tv: "miễn phí" },

                    { voca: "さそいます", tv: "mời, rủ" },

                    { voca: "イベント", tv: "sự kiện" },

                    { voca: "ちょっとおねがいがあるんですが。", tv: "Tôi có chút việc muốn nhờ bạn..." }
                ];



            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })



            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
