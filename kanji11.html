<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=egde">
        <link rel="stylesheet" href="style.css">
        <title>KAIWA</title>
    </head>
    <body>
        <div class="title"><h1>KANJI11</h1></div>
        <div class="container">
            <div class="box">
                <div class="card" id="card">

                </div>
            </div>
        </div>
        <div class="box-button">
            <div class="back bt">Back</div>
            <div class="next bt">Next</div>
        </div>
        <div class="home">
            <button class="bt-home">Home</button>
            <button class="bt-reload">Reload</button>
        </div>
        <script>
            // tạo thẻ 
            

           let lesson3 = [
                { voca: "子供", tv: "こども tử--cung" },

                { voca: "日本", tv: "にほん nhật--bản" },
                { voca: "掛", tv: "か(かる) quải" },
                { voca: "休", tv: "やす (む) hưu" },
                { voca: "会社", tv: "かい--しゃ hội--xã" },

                { voca: "百", tv: "ひゃく bách" },

                { voca: "一人", tv: "ひとり nhất--nhân" },
                { voca: "二人", tv: "ふたり nhị--nhân" },
                { voca: "四人", tv: "よにん tứ--nhân" },

                { voca: "人", tv: "にん nhân" },
                { voca: "台", tv: "だい đài" },
                { voca: "枚", tv: "まい mai" },
                { voca: "回", tv: "かい hồi" },

                { voca: "林檎", tv: "りんご lâm--cầm" },
                { voca: "蜜柑", tv: "みかん mật--cam" },

                { voca: "切手", tv: "きっ--て thiết--thủ" },
                { voca: "葉書", tv: "はがき diệp--thư" },
                { voca: "封筒", tv: "ふう--とう phong--đồng" },

                { voca: "両親", tv: "りょう--しん lưỡng--thân" },
                { voca: "兄弟", tv: "きょう--だい huynh--đệ" },

                { voca: "兄", tv: "あに huynh" },
                { voca: "姉", tv: "あね tỷ" },
                { voca: "弟", tv: "おとうと đệ" },
                { voca: "妹", tv: "いもうと muội" },

                { voca: "外国", tv: "がい--こく ngoại--quốc" },
                { voca: "留学生", tv: "りゅう--がく--せい lưu--học--sinh" },

                { voca: "時間", tv: "じ--かん thời--gian" },
                { voca: "週間", tv: "しゅう--かん chu--gian" },
                { voca: "ヶ月", tv: "かげつ nguyệt" },
                { voca: "年", tv: "ねん niên" },

                { voca: "全部", tv: "ぜん--ぶ(で) toàn--bộ" },
                { voca: "皆", tv: "みんな giai" },

                { voca: "天気", tv: "てん--き thiên--khí" },
                { voca: "出", tv: "で (かけ) xuất" },

                { voca: "行", tv: "い (ってらっしゃい) hành" },
                { voca: "船便", tv: "ふな--びん thuyền--tiện" },
                { voca: "航空便", tv: "こう--くう--びん hàng--không--tiện" },

                { voca: "願", tv: "ねが (いします) nguyện" }
            ];

            let a = lesson3.length;
            console.log(a); // 5

            let html = "";

            for (let i = lesson3.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [lesson3[i], lesson3[j]] = [lesson3[j], lesson3[i]];
            }


            for (let i = 1; i <= a; i++) {
                html += `
                    <div class="voca${i} voca">${lesson3[i-1].voca}</div>
                    <div class="tv${i} tv">${lesson3[i-1].tv}</div>
                `;
            }
            document.getElementById("card").innerHTML = html;

            //sắp xếp lại các card item theo chiều ngang
            const vocacard = document.querySelectorAll(".voca");
            const tvcard   = document.querySelectorAll(".tv")

            tvcard.forEach((el,index)=>{
                el.style.transform = `translateX(${index * 100}%)`;
            })

            vocacard.forEach((el, index) => {
                
                el.style.transform = `translateX(${index * 100}%)`;
                
            });
            
            // lật flash card
            const voca_card = [];
            const tv_card = [];
            
            for (let i=1; i<(a+1); i++){
                voca_card[i] = document.querySelector(`.voca${i}`);
                tv_card[i] = document.querySelector(`.tv${i}`);

                voca_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "6";
                })
                tv_card[i].addEventListener("click", function(){
                    tv_card[i].style.zIndex = "4";
                })
            }

            // function tự động lật card
            function latcard(){
                for (let i=1; i<(a+1); i++){
                    tv_card[i].style.zIndex = "4"; 
                }
            }


            // next 
            let i_next = 0;
            const next = document.querySelector(".next")
            const back = document.querySelector(".back")

            back.addEventListener("click", function(){
                i_next = i_next - 1;
                if (i_next < 0){
                    i_next = (a-1);
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })
            next.addEventListener("click", function(){
                i_next = i_next + 1;
                if (i_next > (a-1)){
                    i_next = 0;
                }
                document.querySelector(".card").style.transform = `translateX(${i_next*(-100)}%)`
                latcard();
            })


            // console.log(voca_card);
            // console.log(tv_card);


            //quay về home
            const home = document.querySelector(".bt-home")

            home.addEventListener("click", function(){
                window.location.href = "index.html";
            })
            // nút reload
            document.querySelector(".bt-reload").addEventListener("click", function () {
                location.reload();
            });

        </script>
    </body>
</html>
